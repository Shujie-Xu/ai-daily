name: Clean expired audio

on:
  schedule:
    - cron: '40 3 * * *'  # 11:40 Asia/Shanghai / 03:40 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add gh-pages worktree
        run: |
          git fetch origin gh-pages
          git worktree add gh-pages-wt origin/gh-pages

      - name: Remove audio older than 45 days
        run: node src/pipeline/clean-audio.js --days=45 --dir=gh-pages-wt/docs/audio

      - name: Commit and push if changed
        working-directory: gh-pages-wt
        run: |
          if git diff --quiet -- docs/audio/; then
            echo "No expired audio to delete"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add docs/audio/
          git commit -m "chore: clean expired audio files"
          git push origin gh-pages
