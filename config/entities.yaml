# AI Daily — Entity watchlist & weak-signal templates
# Used by src/fetch/weak-signal.js to generate targeted queries.

updated: "2026-04-17"

# Templates expanded per (entity × theme). Placeholders: {entity}, {theme}, {site}
search_templates:
  - "{entity} {theme}"
  - "{entity} latest {theme}"
  - "{entity} {theme} Reuters OR TechCrunch OR VentureBeat OR The Information"
  - "site:{site} {entity} {theme}"

# Themes paired with each entity.
themes:
  - "model launch"
  - "API pricing"
  - "enterprise rollout"
  - "identity verification / real-name policy"
  - "acquisition rumor / deal talks"
  - "funding / strategic investment"
  - "robot brain / embodied foundation model"
  - "vision-language-action model"
  - "robotics software / simulation / control stack"
  - "humanoid deployment / factory pilot"

# Tracked entities. site_hints feed the {site} placeholder above.
entities:
