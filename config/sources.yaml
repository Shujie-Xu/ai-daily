# ── Search dimensions ────────────────────────────────────────────────────────
# Tavily 的核心使命：补 RSS 没覆盖的源（中文媒体、Crunchbase、DeepMind/Meta/xAI 等无 feed 的 tier1）。
# 主题词查询保留少量精华（model/funding/policy/embodied/rumor），其余靠 site: 限定 + 实体词。
dimensions:
  - id: model
    label: "模型发布 / 产品更新（主题词）"
    queries:
      - '"AI model release" OR "LLM launch" OR "foundation model" latest'
      - '"API pricing" OR "model pricing" OR "enterprise launch" AI'
      - '"大模型" OR "AI产品发布" 2026'

  - id: funding_vc
    label: "融资 / 收购（侧重 Crunchbase + 中文 VC）"
    queries:
      - "site:crunchbase.com AI raises OR funding 2026"
      - 'AI startup "series A" OR "series B" OR "series C" raises 2026'
      - '"AI acquisition" OR "acqui-hire" OR "strategic investment" AI OR robotics'
      - "AI 融资 OR 人工智能投资 site:36kr.com OR site:latepost.com OR site:itjuzi.com"

  - id: policy
    label: "监管 / 政策"
    queries:
      - '"AI regulation" OR "AI policy" OR "AI law" 2026'
      - '"AI 监管" OR "人工智能法案" 2026'

  - id: embodied_intelligence
    label: "具身智能 / 机器人"
    queries:
      - '"embodied AI" OR "vision-language-action" OR "world model" 2026'
      - '"humanoid robot" deployment OR pilot OR funding'
      - '"具身智能" OR "机器人大脑" 2026'

  - id: rumor_signal
    label: "传闻 / 弱信号"
    queries:
      - '"rumor" OR "reported" OR "people familiar" AI startup'
      - '"in talks" OR "deal talks" OR "explores sale" AI'

  - id: buzz_cn
    label: "中文媒体（核心使命：补 RSS 缺口）"
    queries:
      - "site:36kr.com AI 模型 OR 智能体 OR 大模型"
      - "site:latepost.com AI OR 人工智能"
      - "site:tmtpost.com AI 模型 OR AI 产品"
      - "site:cls.cn AI 大模型 OR 智能体"
      - "site:finance.sina.com.cn AI 模型 OR 人工智能"
      - "site:huxiu.com AI 模型 OR 人工智能"

  - id: targeted_entities
    label: "无 RSS 的 tier1 实体（DeepMind / Meta / xAI / Information）"
    queries:
      - "site:deepmind.google OR site:blog.google Gemini OR DeepMind"
      - "site:ai.meta.com Llama OR Meta AI latest"
      - "site:x.ai Grok OR xAI launch"
      - "site:theinformation.com AI OR OpenAI OR Anthropic"
      - "Cursor OR Cognition OR Windsurf AI coding 2026"

  # 已删 dimensions:
  #  - community: HN/Reddit RSS 已覆盖
  #  - research:  paperswithcode/arxiv 已通过 RSS（CSAI 删除前）和 funding_vc 间接覆盖
