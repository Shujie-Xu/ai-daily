# AI Daily — Sources & Search Configuration
# Single source of truth for what to fetch and how.
# Edit here; code reads this at runtime.

updated: "2026-04-17"

# ── Tavily API settings ─────────────────────────────────────────────────────
search_api:
  search_depth: advanced      # basic → advanced for better recall
  time_range: week            # days:1 → week, then filter by freshness in pipeline
  max_results: 8
  key_rotation: true          # fall back to TAVILY_API_KEY_2 on 429

