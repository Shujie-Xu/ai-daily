<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none}

/* ── Theme tokens ── */
:root{
  --bg:#f0f0f4;--card:#f0f0f4;--subtle:#e8e8ed;--muted:#e0e0e6;
  --border:#d8d8de;--border-s:#e0e0e6;
  --t1:#09090b;--t2:#3f3f46;--t3:#71717a;--t4:#a1a1aa;--t5:#d4d4d8;
  --pill:#09090b;--pill-txt:#ffffff;
  --accent:#09090b;--acc-txt:#ffffff;
  --hov:rgba(0,0,0,0.012);
  --modal-ov:rgba(0,0,0,0.18);
  --shadow:0 32px 80px rgba(0,0,0,0.08);
  --hdr-bg:rgba(240,240,244,0.88);
  --ctx:rgba(0,0,0,0.06);
  --ctx-border:#d4d4d8;
  --neu-raised:-7px -7px 14px rgba(255,255,255,0.9),7px 7px 14px rgba(174,174,192,0.42);
  --neu-hover:-5px -5px 10px rgba(255,255,255,0.9),5px 5px 10px rgba(174,174,192,0.55);
  --neu-press:inset -3px -3px 7px rgba(255,255,255,0.8),inset 3px 3px 7px rgba(174,174,192,0.38);
}
[data-theme="dark"]{
  --bg:#1a1a1f;--card:#1a1a1f;--subtle:#222228;--muted:#2a2a30;
  --border:#2e2e35;--border-s:#262630;
  --t1:#fafafa;--t2:#d4d4d8;--t3:#a1a1aa;--t4:#71717a;--t5:#52525b;
  --pill:#fafafa;--pill-txt:#0a0a0c;
  --accent:#fafafa;--acc-txt:#09090b;
  --hov:rgba(255,255,255,0.025);
  --modal-ov:rgba(0,0,0,0.72);
  --shadow:0 32px 80px rgba(0,0,0,0.55);
  --hdr-bg:rgba(26,26,31,0.88);
  --ctx:rgba(255,255,255,0.04);
  --ctx-border:#3b3b42;
  --neu-raised:-5px -5px 10px rgba(255,255,255,0.05),6px 6px 12px rgba(0,0,0,0.7);
  --neu-hover:-3px -3px 7px rgba(255,255,255,0.06),4px 4px 9px rgba(0,0,0,0.75);
  --neu-press:inset -2px -2px 5px rgba(255,255,255,0.04),inset 3px 3px 7px rgba(0,0,0,0.65);
}

/* ── Base ── */
body{
  -webkit-tap-highlight-color:transparent;
  background:var(--bg);color:var(--t1);
  font-family:'Sora',-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;
  font-size:15px;line-height:1.6;min-height:100vh;
  transition:background .25s,color .25s;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.2);border-radius:4px}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes archDrop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.entered .a0{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) 0s both}
.entered .a1{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .06s both}
.entered .a2{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .12s both}
.entered .a3{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .16s both}
.entered .a4{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .20s both}

/* ── Header ── */
header{
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  background:var(--hdr-bg);
  isolation:isolate;
}
.hdr{max-width:880px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:48px}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--t1)}
.logo-txt{font-size:13.5px;font-weight:600;letter-spacing:-.02em}
/* ── Theme toggle (sliding pill) ── */
.theme-toggle{
  width:52px;height:28px;border-radius:999px;
  border:1px solid var(--border);background:var(--subtle);
  position:relative;cursor:pointer;transition:background .3s,border-color .3s;
  flex-shrink:0;
}
.theme-knob{
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;
  background:var(--t1);
  display:flex;align-items:center;justify-content:center;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),background .3s;
}
[data-theme="dark"] .theme-knob{transform:translateX(24px)}
.theme-knob svg{width:10px;height:10px;stroke:var(--bg);fill:none;stroke-width:1.8;transition:opacity .2s}

/* ── Main ── */
main{max-width:880px;margin:0 auto;padding:0 24px}

/* ── Hero ── */
.hero{padding:48px 0 36px}
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.nav-btn{
  width:28px;height:28px;border-radius:7px;
  border:1px solid var(--border);background:transparent;color:var(--t3);
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;padding:0;flex-shrink:0;
}
.nav-btn:disabled{opacity:.35;cursor:default}
.nav-btn:not(:disabled):hover{background:var(--subtle)}
.arch-wrap{position:relative}
.arch-toggle{
  padding:5px 12px;border-radius:7px;
  border:1px solid var(--border);background:transparent;color:var(--t3);
  font-size:12px;font-family:'SF Mono','Menlo','Consolas',monospace;font-weight:500;
  display:flex;align-items:center;gap:6px;transition:all .12s;
}
.arch-toggle.open{background:var(--subtle)}
.arch-chev{transition:transform .15s}
.arch-chev.open{transform:rotate(180deg)}
.arch-drop{
  position:fixed;z-index:9999;
  border-radius:12px;width:252px;
  box-shadow:0 8px 32px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.1);
  overflow:hidden;display:none;
}
/* ── Calendar ── */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.cal-mon{font-size:13px;font-weight:600;color:var(--t1)}
.cal-nav{background:none;border:none;cursor:pointer;font-size:17px;color:var(--t3);padding:2px 6px;border-radius:5px;line-height:1;transition:background .1s}
.cal-nav:hover{background:var(--subtle)}
.cal-nav:disabled{opacity:.22;cursor:default}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:0 10px 10px}
.cal-dn{text-align:center;font-size:10px;font-weight:600;color:var(--t4);padding:3px 0 5px}
.cal-d{text-align:center;font-size:12.5px;border-radius:6px;padding:6px 0;position:relative;line-height:1.2}
.cal-has{cursor:pointer;color:var(--t1);font-weight:500}
.cal-has:hover{background:var(--subtle)}
.cal-no{color:var(--t5);cursor:default}
.cal-sel{background:var(--t1)!important;color:var(--bg)!important;font-weight:700}
.cal-dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--t4)}
.hero-title{
  font-size:clamp(32px,4.5vw,44px);font-weight:300;
  letter-spacing:-.04em;line-height:1.08;
}
.hero-stats{margin-top:12px;display:flex;align-items:center;gap:12px;color:var(--t3);font-size:13px}
.stat-live{display:flex;align-items:center;gap:5px}
.dot-green{width:5px;height:5px;border-radius:50%;background:#22c55e}
.sep{width:2px;height:2px;border-radius:50%;background:var(--t5);flex-shrink:0}

/* ── Filters ── */
.filters{
  display:flex;gap:5px;padding-bottom:20px;
  overflow-x:auto;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.f-btn{
  padding:4px 12px;border-radius:999px;font-size:12.5px;font-weight:500;
  border:1px solid var(--border);background:transparent;color:var(--t4);
  white-space:nowrap;transition:all .12s;display:flex;align-items:center;gap:4px;
}
.f-btn.on{background:var(--pill);color:var(--pill-txt);border-color:var(--pill)}
.f-cnt{font-family:'SF Mono','Menlo','Consolas',monospace;font-size:10px;opacity:.45}

/* ── Cat label ── */
.cat{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);line-height:1}

/* ── Featured ── */
.featured{
  padding:24px 22px 22px;border-radius:16px;cursor:pointer;
  background:var(--card);border:none;
  box-shadow:var(--neu-raised);
  transition:box-shadow .18s,transform .18s;
  margin-bottom:0;padding-bottom:20px;border-bottom:1px solid var(--t4);
  display:block;
  will-change:transform;
}
.featured:hover{box-shadow:var(--neu-hover);transform:translateY(-1px)}
.feat-cats{display:flex;align-items:center;gap:6px;margin-top:14px}
.card-dot{width:2px;height:2px;border-radius:50%;background:var(--t5);flex-shrink:0}
.feat-title{
  font-size:clamp(20px,2.8vw,26px);font-weight:500;
  line-height:1.35;letter-spacing:-.02em;transition:opacity .15s;
}
.feat-summary{font-size:14.5px;line-height:1.7;color:var(--t3);margin-top:8px;max-width:580px}
.feat-meta{margin-top:16px;font-family:'SF Mono','Menlo','Consolas',monospace;font-size:11px;color:var(--t4);display:flex;align-items:center;gap:8px}

/* ── News grid (neumorphic cards) ── */
.news-list{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding-top:20px;
}
@media(max-width:560px){.news-list{grid-template-columns:1fr;gap:16px}}
.n-item{
  color:inherit;
  display:flex;flex-direction:column;
  padding:18px 18px 14px;
  border-radius:16px;
  background:var(--card);
  border:none;
  box-shadow:var(--neu-raised);
  cursor:pointer;
  text-align:left;
  transition:box-shadow .18s,transform .18s;
  width:100%;
}
.n-item:hover{box-shadow:var(--neu-hover);transform:translateY(-2px)}
.n-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.n-cats{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.n-title{font-size:14px;font-weight:600;line-height:1.5;letter-spacing:-.01em;color:var(--t1)}
.n-summary{font-size:12.5px;line-height:1.55;color:var(--t3);margin-top:2px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.n-src{display:none}

/* ── Footer ── */
footer{
  padding:24px 0;margin-top:16px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.foot-l{font-size:11.5px;color:var(--t4);font-family:'SF Mono','Menlo','Consolas',monospace}
.foot-r{display:flex;align-items:center;gap:6px}
.foot-dot{width:4px;height:4px;border-radius:50%;background:var(--t5)}
.foot-brand{font-size:11.5px;font-weight:500;color:var(--t4)}

/* ── Modal overlay ── */
.m-ov{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;
  padding:0 16px 16px;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);
  transition:background .2s ease,backdrop-filter .2s ease,-webkit-backdrop-filter .2s ease;
  display:none;
}
.m-ov.vis{
  background:var(--modal-ov);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.m-sheet{
  background:var(--card);border:none;
  border-radius:20px;width:100%;max-width:620px;max-height:88vh;
  display:flex;flex-direction:column;
  box-shadow:-4px -4px 8px rgba(255,255,255,0.65),4px 4px 10px rgba(174,174,192,0.28),0 20px 48px rgba(0,0,0,0.1);
  transform:translateY(24px);opacity:0;
  transition:transform .25s cubic-bezier(.16,1,.3,1),opacity .2s ease;
}
.m-sheet.vis{transform:translateY(0);opacity:1}
[data-theme="dark"] .m-sheet{box-shadow:-3px -3px 7px rgba(255,255,255,0.04),4px 4px 10px rgba(0,0,0,0.65),0 20px 48px rgba(0,0,0,0.4)}
.m-sheet .btn-tts,.m-sheet .m-nav-btn,.m-sheet .m-close,.m-sheet .btn-read{
  --neu-raised:-3px -3px 6px rgba(255,255,255,0.85),3px 3px 6px rgba(174,174,192,0.38);
  --neu-hover:-2px -2px 4px rgba(255,255,255,0.85),2px 2px 5px rgba(174,174,192,0.5);
  --neu-press:inset -2px -2px 4px rgba(255,255,255,0.75),inset 2px 2px 4px rgba(174,174,192,0.3);
}
[data-theme="dark"] .m-sheet .btn-tts,[data-theme="dark"] .m-sheet .m-nav-btn,[data-theme="dark"] .m-sheet .m-close,[data-theme="dark"] .m-sheet .btn-read{
  --neu-raised:-2px -2px 5px rgba(255,255,255,0.04),3px 3px 6px rgba(0,0,0,0.6);
  --neu-hover:-1px -1px 4px rgba(255,255,255,0.05),2px 2px 5px rgba(0,0,0,0.65);
  --neu-press:inset -1px -1px 3px rgba(255,255,255,0.03),inset 2px 2px 4px rgba(0,0,0,0.55);
}
.m-handle-row{display:none}
.m-hdr{padding:20px 28px 16px}
.m-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.m-meta-l{display:flex;align-items:center;gap:8px}
.m-time{font-family:'SF Mono','Menlo','Consolas',monospace;font-size:10.5px;color:var(--t4)}
.m-close{
  width:28px;height:28px;border-radius:8px;border:none;
  background:var(--card);color:var(--t3);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;padding:0;cursor:pointer;
  box-shadow:var(--neu-raised);
  transition:box-shadow .12s;
}
.m-close:hover{box-shadow:var(--neu-hover)}
.m-close:active{box-shadow:var(--neu-press)}
.m-title{
  font-family:'Sora',-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;
  font-size:clamp(20px,3.2vw,26px);font-weight:500;
  line-height:1.35;letter-spacing:-.02em;
}
.src-dot{width:4px;height:4px;border-radius:50%;background:var(--t1);flex-shrink:0}
.src-name{font-size:12px;font-weight:500;color:var(--t3)}
/* ── Modal slide animation ── */
@keyframes slideInL{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
@keyframes slideInR{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:none}}
.slide-l{animation:slideInL .22s cubic-bezier(.16,1,.3,1) both}
.slide-r{animation:slideInR .22s cubic-bezier(.16,1,.3,1) both}
/* ── Spring UX (Apple-style simultaneous) ── */
@keyframes cardTap{
  0%  {transform:scale(1)}
  50% {transform:scale(0.925)}
  75% {transform:scale(0.94)}
  100%{transform:scale(0.93)}
}
.card-popping{
  animation:cardTap .45s cubic-bezier(.45,.1,.3,1) forwards !important;
  pointer-events:none;
}
.card-popping,.card-popping:hover{
  transition:none !important;
  box-shadow:var(--neu-raised) !important;
}
@keyframes sheetExpand{
  0%  {transform:scale(0.7) translateY(14px);opacity:0}
  55% {transform:scale(1.03) translateY(-2px);opacity:1}
  78% {transform:scale(0.99) translateY(1px);opacity:1}
  100%{transform:scale(1)    translateY(0);   opacity:1}
}
.m-sheet.spring{
  will-change:transform,opacity;
}
.m-sheet{will-change:transform,opacity}
.m-title,.m-body{transition:filter .2s ease,transform .2s ease,opacity .2s ease}
.m-title.nav-out-l,.m-body.nav-out-l{filter:blur(5px);transform:translateX(-30px) scale(0.97);opacity:0}
.m-title.nav-out-r,.m-body.nav-out-r{filter:blur(5px);transform:translateX(30px) scale(0.97);opacity:0}
.m-title.nav-in-l,.m-body.nav-in-l{filter:blur(5px);transform:translateX(30px) scale(0.97);opacity:0}
.m-title.nav-in-r,.m-body.nav-in-r{filter:blur(5px);transform:translateX(-30px) scale(0.97);opacity:0}
/* ── Progress bar fused into header bottom border ── */
.m-progress{
  height:2px;background:var(--border);margin:14px 0 0;flex-shrink:0;overflow:hidden;
}
.m-progress-inner{height:100%;width:0%;background:var(--t1);transition:width .1s linear}
.m-body{flex:1;overflow-y:auto;padding:24px 28px 8px}
.m-content{font-size:15px;line-height:1.9;color:var(--t2);letter-spacing:.005em;font-family:'Sora',-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif}
.m-content p{margin-bottom:16px}
.m-content p:last-child{margin-bottom:0}
.m-ctx{margin-top:24px;padding-left:16px;border-left:2px solid var(--ctx-border)}
.m-ctx-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t4);margin-bottom:6px}
.m-ctx-txt{font-size:13.5px;line-height:1.7;color:var(--t3)}
.m-tags{margin-top:20px;display:flex;flex-wrap:wrap;gap:6px}
.m-tag{
  font-size:11px;font-weight:500;color:var(--t4);
  padding:3px 10px;border:1px solid var(--border);border-radius:999px;
  font-family:'Sora',sans-serif;letter-spacing:.01em;
  transition:color .12s,border-color .12s;
}
.m-tag:hover{color:var(--t2);border-color:var(--t4)}
.m-foot{
  padding:14px 28px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.m-nav{display:flex;align-items:center;gap:4px}
.m-nav-btn{
  width:28px;height:28px;border-radius:7px;
  border:none;background:var(--card);color:var(--t3);
  display:flex;align-items:center;justify-content:center;padding:0;
  cursor:pointer;transition:box-shadow .12s;
  box-shadow:var(--neu-raised);
}
.m-nav-btn:disabled{opacity:.35;cursor:default;box-shadow:none}
.m-nav-btn:not(:disabled):hover{box-shadow:var(--neu-hover)}
.m-nav-btn:not(:disabled):active{box-shadow:var(--neu-press)}
.m-nav-cnt{font-family:'SF Mono','Menlo','Consolas',monospace;font-size:10.5px;color:var(--t4);margin:0 10px}
.m-actions{display:flex;align-items:center;gap:8px}
.btn-tts{
  width:32px;height:32px;border-radius:8px;
  border:none;background:var(--card);color:var(--t3);
  display:flex;align-items:center;justify-content:center;padding:0;
  cursor:pointer;transition:box-shadow .12s,color .12s;
  box-shadow:var(--neu-raised);
}
.btn-tts:hover{box-shadow:var(--neu-hover)}
.btn-tts:active{box-shadow:var(--neu-press)}
.btn-tts.playing{color:var(--t1);box-shadow:var(--neu-press)}
@keyframes ttsPulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-tts.playing svg{animation:ttsPulse 1.6s ease-in-out infinite}
.btn-read{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:8px;
  background:var(--card);color:var(--t2);
  border:none;font-size:13px;font-weight:500;font-family:'Sora',sans-serif;
  cursor:pointer;transition:box-shadow .12s;
  box-shadow:var(--neu-raised);
}
.btn-read:hover{box-shadow:var(--neu-hover);color:var(--t1)}
.btn-read:active{box-shadow:var(--neu-press)}

/* ── Touch swipe hint ── */
@media (max-width:640px){
  .m-sheet{border-radius:20px 20px 16px 16px}
  .m-hdr{padding:16px 20px 0}
  .m-body{padding:20px 20px 8px}
  .m-foot{padding:12px 20px 16px}
}
</style>
</head>
<body>

<header>
  <div class="hdr">

<script>window.ARTICLES_DATA = [{"title":"五角大楼正式将Anthropic列为供应链安全风险","summary":"美国国防部正式通知Anthropic，其公司及产品被认定为供应链安全风险，所有军方承包商须停用Claude。","full_content":"美国国防部于3月5日正式通知Anthropic，将其公司及产品认定为\"供应链安全风险\"，即日生效。这是美国历史上首次将一家本土企业列入该名单——此前该标签仅用于华为等外国对手。所有国防承包商须证明未在五角大楼项目中使用Anthropic的Claude模型。\n\n冲突源于双方对AI使用边界的分歧。Anthropic要求国防部承诺不将Claude用于全自主武器和国内大规模监控，但五角大楼坚持在所有合法用途上不受限制地使用。去年7月，Anthropic曾与国防部签署2亿美元合同，并率先将AI模型部署到保密网络的任务流程中，但随着谈判破裂，OpenAI和马斯克的xAI迅速填补空缺，在Anthropic被列入黑名单数小时后即宣布与五角大楼达成协议。\n\n特朗普总统也下令联邦机构立即停用Anthropic技术，并在接受Politico采访时称已\"像赶狗一样解雇了Anthropic\"。国防部高级官员表示，军方不允许任何供应商通过限制合法用途来干预指挥链。该事件对Anthropic的合作伙伴Palantir造成冲击，后者约60%的美国收入依赖政府合同，分析师警告短期内将面临运营中断。这一认定标志着美国政府与AI安全理念之间的深层矛盾公开化。","url":"https://www.cnbc.com/2026/03/05/anthropic-pentagon-ai-claude-iran.html","best_url":"https://www.cnbc.com/2026/03/05/anthropic-pentagon-ai-claude-iran.html","categories":["policy","event"],"tags":["Anthropic","五角大楼","供应链安全","AI监管","国防政策"],"context":"","heat":5,"audio_url":"audio/2026-03-08-0.mp3"},{"title":"Anthropic CEO宣布将就安全风险认定提起法律挑战","summary":"Dario Amodei称该认定在法律上站不住脚，表示Anthropic别无选择只能诉诸法律途径。","full_content":"Anthropic CEO Dario Amodei于3月5日确认公司已被美国政府正式认定为供应链安全风险，并表示\"别无选择\"只能通过法律途径挑战这一决定。Amodei在公开声明中强调，该认定在法律上站不住脚，Anthropic是唯一被公开列入该名单的美国公司，此前这一标签历来仅用于华为等外国对手企业。\n\nAmodei在声明中重申，Anthropic从未试图干预军事行动决策，其唯一关切是在全自主武器和国内大规模监控这两个高层使用领域设立例外。他同时指出，该认定不能也不会限制与国防部合同无关的Claude商业使用和合作关系。微软方面回应称，其法律团队研究后认定Anthropic产品可继续向非国防部客户提供服务。\n\n事件还牵出一份泄露的内部备忘录。Amodei此前在备忘录中称政府不喜欢Anthropic是因为公司没有捐款或对特朗普\"独裁式吹捧\"，但随后他为此道歉，表示备忘录写于\"公司艰难的一天\"，不代表其深思熟虑的立场。与此同时，竞争对手OpenAI和xAI已迅速与五角大楼达成保密网络部署协议，AI国防市场格局正在加速重塑。","url":"https://www.cnbc.com/2026/03/05/anthropic-ceo-says-no-choice-but-to-challenge-trump-admins-supply-chain-risk-designation-in-court.html","best_url":"https://www.cnbc.com/2026/03/05/anthropic-ceo-says-no-choice-but-to-challenge-trump-admins-supply-chain-risk-designation-in-court.html","categories":["policy","event"],"tags":["Anthropic","Dario Amodei","法律挑战","AI政策","供应链风险"],"context":"","heat":5,"audio_url":"audio/2026-03-08-1.mp3"},{"title":"谷歌亚马逊微软力挺Anthropic民用AI不受影响","summary":"尽管五角大楼将Anthropic列为安全风险，三大云巨头确认将继续在非国防领域提供Claude模型。","full_content":"在五角大楼正式将Anthropic列为供应链安全风险后，谷歌、亚马逊和微软三大云计算巨头于3月5日至6日相继表态，确认将在非国防领域继续提供Anthropic的Claude AI模型。微软率先声明，法律团队研究认定Anthropic产品可通过M365、GitHub和AI Foundry继续向非国防部客户提供。谷歌随后跟进，明确该认定不妨碍双方在非国防项目上的合作，Claude仍可通过Vertex AI平台使用。亚马逊AWS也确认将继续通过Bedrock和GovCloud提供Claude模型。\n\n三大巨头的力挺对Anthropic至关重要。谷歌是Anthropic最重要的投资方之一，累计投资达30亿美元，并提供多达100万个自研TPU芯片用于模型训练。微软去年11月宣布对Anthropic投资最高50亿美元。亚马逊则是Anthropic最大的云合作伙伴。\n\n不过，部分国防科技企业已要求员工停用Claude并转向OpenAI等替代方案。据《华盛顿邮报》报道，尽管遭到封杀，Claude仍被用于美国最近对伊朗的军事行动中，完全迁移至其他AI模型预计需要六个月。这一局面显示，Anthropic在民用AI市场的地位暂时稳固，但军事AI领域的缺失将为竞争对手创造巨大机会。","url":"https://the-decoder.com/despite-pentagon-ban-google-aws-and-microsoft-stick-with-anthropics-ai-models/","best_url":"https://www.cnbc.com/2026/03/06/google-says-anthropic-remains-available-outside-of-defense-projects.html","categories":["product","event"],"tags":["谷歌","微软","亚马逊","Anthropic","云计算"],"context":"","heat":4,"audio_url":"audio/2026-03-08-2.mp3"},{"title":"纽约时报深度：OpenAI与Anthropic的五角大楼之争","summary":"五角大楼合同之争凸显硅谷两大AI巨头创始人的私人恩怨与对AI未来的根本分歧。","full_content":"OpenAI与Anthropic之间的五角大楼合同之争，已演变为硅谷AI行业最具戏剧性的商业对抗。纽约时报深度报道指出，这场竞争的根源可追溯至2021年，当时Anthropic创始人Dario Amodei因与Sam Altman在AI安全路线上的根本分歧，率领一批核心研究人员从OpenAI出走创立Anthropic。\n\n事件的直接导火索是Anthropic拒绝允许五角大楼将其Claude模型用于国内大规模监控和无人监管的自主武器系统。国防部长Hegseth随即取消了与Anthropic价值2亿美元的合同，并史无前例地将其列为\"供应链安全风险\"。特朗普总统在Truth Social上称Anthropic为\"左翼疯子\"，下令所有联邦机构停止使用其产品。而OpenAI则在数小时内迅速与五角大楼签署了自己的协议。\n\nMIT科技评论分析指出，OpenAI的合同采取了更务实的法律路径——不像Anthropic要求写入具体禁止条款，而是援引现行法律作为保障，本质上仍允许五角大楼进行\"任何合法使用\"。这种差异正是两家公司创始人理念分歧的缩影：Anthropic追求道德底线，OpenAI选择务实妥协。目前双方都面临来自员工的内部压力，超过850名行业工程师签署公开信支持Anthropic的立场。","url":"https://www.nytimes.com/2026/03/07/technology/openai-anthropic-pentagon-rivalry.html","best_url":"https://www.nytimes.com/2026/03/07/technology/openai-anthropic-pentagon-rivalry.html","categories":["event"],"tags":["OpenAI","Anthropic","五角大楼","AI安全","军事AI"],"context":"","heat":4,"audio_url":"audio/2026-03-08-3.mp3"},{"title":"大西洋月刊：Anthropic的伦理立场或正在获得回报","summary":"分析认为Anthropic拒绝军方自主武器使用的立场虽遭短期打击，但可能赢得长期市场信任。","full_content":"大西洋月刊分析认为，Anthropic拒绝五角大楼合同条款看似损失惨重，实则可能成为一次极其成功的品牌事件。数据显示，在国防部宣布切断合作后，Anthropic的Claude应用在苹果App Store冲上下载榜第一名，且截至发稿仍保持该位置。公司首席产品官透露，Claude日下载量突破100万次，公司表示\"在Claude可用的每个国家，每天都在刷新注册纪录\"。\n\n与此形成鲜明对比的是，OpenAI的ChatGPT在签约五角大楼后遭遇用户反噬——卸载量飙升295%，一星评价暴增近800%，五星评价下降一半。OpenAI CEO Altman随后公开承认\"不应该如此仓促\"签署协议，并呼吁五角大楼不应将Anthropic列为供应链风险。\n\n更深远的影响在于人才竞争层面。Anthropic赢得了大量行业工程师的信任和敬佩，多封支持信在竞争对手员工中流传，部分OpenAI员工甚至威胁离职。前共和党众议员Riggleman指出，Hegseth将Anthropic列为供应链风险的做法\"法律基础极其薄弱\"——美国政府从未对本国企业使用过这一标签，此举很可能在法庭上被推翻。","url":"https://www.theatlantic.com/ideas/2026/03/anthropic-pentagon-contract-openai/686285/","best_url":"https://www.theatlantic.com/ideas/2026/03/anthropic-pentagon-contract-openai/686285/","categories":["event","policy"],"tags":["Anthropic","Claude","AI伦理","品牌效应","用户增长"],"context":"","heat":4,"audio_url":"audio/2026-03-08-4.mp3"},{"title":"美国起草严格AI新规要求模型可用于任何合法用途","summary":"英国金融时报报道，美国政府正拟定新规，要求AI公司在政府合同中允许模型的所有合法使用。","full_content":"英国金融时报独家报道，特朗普政府正在起草针对民用AI合同的严格新规，要求AI公司必须授予美国政府不可撤销的许可，允许其将AI系统用于\"任何合法用途\"。这一草案由美国总务管理局（GSA）制定，适用于民用政府合同，是联邦层面AI采购标准化的重要举措。\n\n该规定的出台背景直接关联五角大楼与Anthropic的对峙。此前国防部因Anthropic坚持在合同中写入监控和自主武器使用限制条款而中断合作。新草案实质上将五角大楼对AI公司的要求制度化、扩大化——从军事合同延伸至整个联邦民用采购体系。\n\n草案还包含两项重要附加条款：一是禁止AI公司在系统输出中\"有意编码党派或意识形态倾向\"；二是要求公司披露其模型是否\"经修改以符合任何非美国联邦政府的合规或监管框架\"，后者被广泛解读为针对欧盟AI法案等外国监管标准的条款。这些规定若正式实施，将深刻重塑AI行业与美国政府的合作模式，迫使企业在全球合规策略上做出艰难抉择。","url":"https://www.ft.com/content/d8c2969f-2812-44d2-8860-3059fb770bdb","best_url":"https://www.ft.com/content/d8c2969f-2812-44d2-8860-3059fb770bdb","categories":["policy"],"tags":["AI监管","美国政策","政府采购","AI合规","GSA"],"context":"GSA（General Services Administration，美国总务管理局）是美国联邦政府的采购管理机构，负责制定政府采购标准和合同条款。其制定的AI采购指南虽针对民用合同，但通常会成为其他联邦机构的参考模板，影响力远超民用领域。","heat":4,"audio_url":"audio/2026-03-08-5.mp3"},{"title":"研究显示Google AI Overviews重创媒体行业流量","summary":"新数据表明Google的AI概览功能导致部分主要媒体网站流量下降高达97%。","full_content":"SEO研究机构Growtika发布的最新报告显示，Google于2024年中推出的AI Overviews功能正在对媒体行业造成毁灭性打击。报告追踪了10家主要科技媒体网站从2024年初至2026年初的流量数据，发现这些网站的Google搜索流量从峰值的月均1.12亿次骤降至不足5000万次。\n\n在受影响的媒体中，Digital Trends遭受了最为惨烈的冲击——其月流量从2024年3月的850万次暴跌至2026年1月的约26.5万次，降幅高达97%。The Verge、ZDNet和HowToGeek等知名科技媒体也各自损失了超过85%的流量，即使表现最好的Mashable也损失了30%。报告指出，受打击最严重的四家媒体月流量加起来，甚至不及Reddit上r/ChatGPT子版块的单独流量。\n\nGrowtika分析认为，流量暴跌源于三重因素叠加：AI Overviews直接截留用户点击、Google算法大幅提升Reddit等论坛排名、以及越来越多用户转向AI聊天机器人替代搜索。尤其在2025年中Google扩大AI Overviews覆盖范围后，约25%的搜索结果触发了自动摘要，流量下滑显著加速。Google发言人回应称该分析\"存在根本缺陷\"，但这一趋势对依赖搜索流量的媒体商业模式构成了系统性威胁。","url":"https://futurism.com/artificial-intelligence/google-ai-overviews-media","best_url":"https://futurism.com/artificial-intelligence/google-ai-overviews-media","categories":["product","event"],"tags":["Google","AI Overviews","媒体行业","SEO","搜索流量"],"context":"","heat":4,"audio_url":"audio/2026-03-08-6.mp3"},{"title":"Claude Code误删开发者生产环境致2.5年数据丢失","summary":"Anthropic的Claude Code在执行任务时意外删除了开发者的生产数据库和快照，引发社区热议。","full_content":"开发者Alexey Grigorev近日详细披露了一起因AI编程助手Claude Code失控导致生产环境数据全部丢失的严重事故，迅速在技术社区引发广泛讨论。Grigorev原本计划将其AI Shipping Labs网站迁移至AWS，并与已在运行的DataTalks.Club共享基础设施，整个过程通过Terraform进行基础设施管理。\n\n事故的关键转折在于一个被遗忘的状态文件。Grigorev在操作过程中忘记上传Terraform的state文件——该文件记录了当前基础设施的完整状态。缺少状态文件的情况下，Claude Code创建了重复资源。当状态文件最终被上传后，Claude将其视为\"真实状态\"，逻辑性地执行了Terraform destroy命令以消除差异。由于状态文件涵盖了两个网站的全部基础设施描述，这一操作导致数据库、数据库快照等所有资源被彻底清除，2.5年的业务数据瞬间化为乌有。\n\n值得注意的是，Claude Code本身曾建议不要合并两套基础设施，但开发者选择忽略了这一警告。最终在亚马逊商业支持团队的帮助下，数据在约一天内得以恢复。Grigorev总结的教训包括：启用Terraform和AWS的删除保护、将状态文件迁移到S3、以及在执行任何破坏性操作前必须人工审核。这一事件再次敲响了AI代理工具权限管理的警钟。","url":"https://www.tomshardware.com/tech-industry/artificial-intelligence/claude-code-deletes-developers-production-setup-including-its-database-and-snapshots-2-5-years-of-records-were-nuked-in-an-instant","best_url":"https://www.tomshardware.com/tech-industry/artificial-intelligence/claude-code-deletes-developers-production-setup-including-its-database-and-snapshots-2-5-years-of-records-were-nuked-in-an-instant","categories":["product","event"],"tags":["Claude Code","Anthropic","AI安全","Terraform","生产事故"],"context":"","heat":4,"audio_url":"audio/2026-03-08-7.mp3"},{"title":"NVIDIA GTC 2026预览：新一代AI芯片即将亮相","summary":"GTC 2026将于3月16-19日举行，预计发布Blackwell Ultra更新和Vera Rubin芯片信息。","full_content":"NVIDIA年度GPU技术大会GTC 2026将于3月16日至19日在圣何塞举行，业界普遍预期这将成为AI基础设施领域年度最重要的硬件发布事件。本届大会的核心看点集中在三大芯片架构的最新进展。\n\n首先是Blackwell Ultra，作为当前Blackwell架构的重大升级版本，预计将在内存带宽、推理吞吐量和集群扩展稳定性方面带来显著提升。其次是备受瞩目的Vera Rubin平台——这不仅是一款新GPU，而是一个完整的机架级计算平台，整合了Vera CPU、Rubin GPU、下一代NVLink互联和高带宽内存系统。NVIDIA CEO黄仁勋此前在CES 2026上已宣布Vera Rubin平台进入全面生产阶段，预计2026年下半年上市。\n\n第三个关注重点是推理优化架构。随着AI行业从训练转向大规模推理部署，推理已成为AI基础设施的主要成本驱动力。新一代推理专用芯片将着重降低功耗、提高请求吞吐量和减少内存压力。对于全球AI产业而言，GTC的硬件发布直接决定了云服务商的GPU容量分配、推理定价模型调整以及部署流水线优化方向，其影响将持续未来24个月。","url":"https://www.toolient.com/2026/03/nvidia-gtc-new-ai-chips.html","best_url":"https://blogs.nvidia.com/blog/2026-ces-special-presentation/","categories":["product","event"],"tags":["NVIDIA","GTC 2026","Blackwell Ultra","Vera Rubin","AI芯片"],"context":"Vera Rubin平台以美国天文学家薇拉·鲁宾命名，是NVIDIA继Blackwell之后的下一代计算平台，首次在GTC 2025上披露。该平台采用六芯片极端协同设计，整合ARM架构Vera CPU与Rubin GPU，旨在从根本上解决大规模AI训练中的集群通信瓶颈问题。","heat":4,"audio_url":"audio/2026-03-08-8.mp3"},{"title":"中国两会关注脑机接口：加速从实验室到产业化","summary":"新华社报道两会期间多位代表建议加速脑机接口产业化，多项利好政策已落地。","full_content":"2026年全国两会期间，脑机接口首次被写入政府工作报告，明确提出\"培育发展脑机接口等未来产业\"。\"十五五\"规划纲要草案也将脑机接口列为六大前瞻布局重点之一，标志着这一前沿技术正式上升为国家战略级产业方向。\n\n多位代表委员围绕脑机接口产业化建言献策。全国政协委员、天津大学副校长明东指出，我国脑机接口技术研发整体处于世界第一方阵，其团队研发的多款非侵入式脑机接口设备已进入临床应用，累计服务超3000名患者。2025年3月，我国首例侵入式脑机接口前瞻性临床试验在上海成功实施，一位四肢截肢患者通过颅内植入硬币大小的设备，实现了用意念操控电脑。\n\n政策端利好密集落地：2025年国家医保局为脑机接口单独立项，工信部等七部门联合发布产业创新发展实施意见，2026年1月首个脑机接口医疗器械标准正式实施。产业端同步加速——目前我国脑机接口企业已超200家，投融资事件近200起，多家头部企业融资额破亿元。\n\n不过，业内人士也坦言挑战犹存。手指精细动作解码、复杂情感识别等技术瓶颈仍需攻克，与AI、具身智能的深度融合也有待推进。代表委员们呼吁加快建设概念验证、中试测试、检测认证一体化平台，并引导\"耐心资本\"长期投入，推动脑机接口从实验室到产业化的\"关键一跃\"。","url":"http://www.news.cn/20260307/b4cbce9d06434b1d9c629aa3c8076ff0/c.html","best_url":"http://www.news.cn/20260307/b4cbce9d06434b1d9c629aa3c8076ff0/c.html","categories":["policy","research"],"tags":["脑机接口","两会","产业政策","医疗科技","十五五规划"],"context":"","heat":4,"audio_url":"audio/2026-03-08-9.mp3"}];</script>

<script>
(function(){
'use strict';

// ── Helpers ──────────────────────────────────────────────────────
const MONO = "'SF Mono','Menlo','Consolas',monospace";
const CAT_ZH = {model:'模型',product:'产品',funding:'融资',finance:'财务',research:'研究',policy:'政策',event:'事件'};
const CAT_EN = Object.fromEntries(Object.entries(CAT_ZH).map(([k,v])=>[v,k]));

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function src(a){ try{ return new URL(a.best_url||a.url||'').hostname.replace('www.',''); }catch{ return ''; } }
function catZh(c){ return CAT_ZH[c]||c; }

function fmtShort(s){
  const d=new Date(s+'T00:00:00');
  const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[d.getMonth()]+' '+d.getDate();
}
function fmtFull(s){
  const d=new Date(s+'T00:00:00');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mons=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return days[d.getDay()]+', '+mons[d.getMonth()]+' '+d.getDate();
}

// ── Proxy for live article data ──────────────────────────────────
const articles = new Proxy([], { get(_,p){ return (window.ARTICLES_DATA||[])[p]; } });
function allArticles(){ return Array.from({length:articles.length},(_,i)=>articles[i]); }

// ── State ────────────────────────────────────────────────────────
let curCat = '全部';
let modalOpen = false;
let filteredCache = [];
let modalIdx = 0;
const allDates = window.ARCHIVE_DATES || [];
let pageDate = allDates[0] || '2026/03/08';
let archOpen = false;

// Touch swipe
let touchX0 = null, touchT0 = null;

// ── Theme ────────────────────────────────────────────────────────
function applyThemeIcons(t){
  const sun = document.getElementById('iconSun');
  const moon = document.getElementById('iconMoon');
  if(!sun||!moon) return;
  if(t==='dark'){ sun.style.opacity='0'; moon.style.opacity='1'; }
  else { sun.style.opacity='1'; moon.style.opacity='0'; }
}
(function initTheme(){
  const t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  applyThemeIcons(t);
})();

window.toggleTheme = function(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  applyThemeIcons(next);
  // 同步更新日历弹窗背景
  const drop = document.getElementById('archDrop');
  if(drop){ drop.style.backgroundColor = next==='dark' ? '#111114' : '#ffffff'; drop.style.color = next==='dark' ? '#fafafa' : '#09090b'; }
};

// ── Archive ──────────────────────────────────────────────────────
function updateArchLabel(){
  const el = document.getElementById('archLabel');
  if(el) el.textContent = fmtShort(pageDate);
}
function updateHeroTitle(){
  const el = document.getElementById('heroTitle');
  if(el) el.textContent = fmtFull(pageDate);
}
function updateNavBtns(){
  const idx = allDates.indexOf(pageDate);
  const p = document.getElementById('btnPrev');
  const n = document.getElementById('btnNext');
  if(p) p.disabled = idx >= allDates.length-1;
  if(n) n.disabled = idx <= 0;

let calYear=null, calMonth=null;

function buildCalendar(){
  const today = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Shanghai'}).format(new Date());
  const list = document.getElementById('archList');
  if(!list) return;

  // init to pageDate's month on first open
  if(calYear===null){
    calYear  = parseInt(pageDate.slice(0,4));
    calMonth = parseInt(pageDate.slice(5,7)) - 1;
  }

  const datesSet = new Set(allDates);
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const allYM  = [...new Set(allDates.map(d=>d.slice(0,7)))].sort();
  const curYM  = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const canPrev = allYM.length && allYM[0] < curYM;
  const canNext = allYM.length && allYM[allYM.length-1] > curYM;

  const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let cells = dayNames.map(d=>`<div class="cal-dn">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-d"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has=datesSet.has(ds), sel=ds===pageDate, tod=ds===today;
    const cls=['cal-d',has?'cal-has':'cal-no',sel?'cal-sel':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" ${has?`onclick="selectDate('${ds}')"`:''}>
      ${d}${tod&&!sel?'<span class="cal-dot"></span>':''}
    </div>`;
  }

  list.innerHTML=`
    <div class="cal-hdr">
      <button class="cal-nav" onclick="calNav(-1)" ${!canPrev?'disabled':''}>‹</button>
      <span class="cal-mon">${MONTHS[calMonth]} ${calYear}</span>
      <button class="cal-nav" onclick="calNav(1)" ${!canNext?'disabled':''}>›</button>
    </div>
    <div class="cal-grid">${cells}</div>
  `;
}

window.calNav = function(dir){
  calMonth += dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  buildCalendar();
};

function archDropBg(){
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  const drop = document.getElementById('archDrop');
  drop.style.backgroundColor = dark ? '#111114' : '#ffffff';
  drop.style.color = dark ? '#fafafa' : '#09090b';
  drop.style.border = '1px solid ' + (dark ? '#27272a' : '#e4e4e7');
}

window.toggleArch = function(){
  archOpen = !archOpen;
  const drop = document.getElementById('archDrop');
  const btn  = document.getElementById('archToggle');
  btn.classList.toggle('open', archOpen);
  document.getElementById('archChev').classList.toggle('open', archOpen);
  if(archOpen){
    const r = btn.getBoundingClientRect();
    drop.style.top     = (r.bottom + 6) + 'px';
    drop.style.left    = r.left + 'px';
    drop.style.display = 'block';
    archDropBg();
    calYear=null; calMonth=null; buildCalendar();
  } else {
    drop.style.display = 'none';
  }
};

function closeArch(){
  archOpen=false;
  document.getElementById('archDrop').style.display='none';
  document.getElementById('archToggle').classList.remove('open');
  document.getElementById('archChev').classList.remove('open');
}

document.addEventListener('mousedown', function(e){
  if(!archOpen) return;
  const wrap = document.querySelector('.arch-wrap');
  const drop = document.getElementById('archDrop');
  if(wrap && !wrap.contains(e.target) && !drop.contains(e.target)) closeArch();
});

window.selectDate = function(date){
  closeArch();
  loadDateData(date);
};

window.navDate = function(dir){
  // dir=-1: older (prev), dir=1: newer (next)
  const idx = allDates.indexOf(pageDate);
  const ni = idx - dir; // allDates[0]=latest, so "next/newer" = lower index
  if(ni>=0 && ni<allDates.length) loadDateData(allDates[ni]);
};

// calendarSetDate called by loadDateData
window.calendarSetDate = function(date){
  pageDate = date;
  updateArchLabel();
  updateHeroTitle();
  updateNavBtns();
};

// ── Filter bar ───────────────────────────────────────────────────
const ALL_CATS = ['全部','模型','产品','财务','研究','融资','政策','事件'];

function renderFilterBar(){
  const arts = allArticles();
  const bar = document.getElementById('filterBar');
  if(!bar) return;
  bar.innerHTML = ALL_CATS.map(c=>{
    const eng = CAT_EN[c];
    const cnt = c==='全部' ? arts.length : arts.filter(a=>a.categories&&a.categories.includes(eng)).length;
    if(cnt===0 && c!=='全部') return '';
    return `<button class="f-btn${c===curCat?' on':''}" onclick="setFilter('${c}')">${c}<span class="f-cnt">${cnt}</span></button>`;
  }).join('');
}

window.setFilter = function(cat){
  curCat = cat;
  renderFilterBar();
  renderContent();
};

// ── Content rendering ────────────────────────────────────────────
function getFiltered(){
  const arts = allArticles();
  if(curCat==='全部') return arts;
  const eng = CAT_EN[curCat]||curCat;
  return arts.filter(a=>a.categories&&a.categories.includes(eng));
}

function renderContent(){
  const filtered = getFiltered();
  filteredCache = filtered;

  // Featured = highest heat
  let featIdx = 0;
  filtered.forEach((a,i)=>{ if((a.heat||0)>(filtered[featIdx].heat||0)) featIdx=i; });
  const featured = filtered[featIdx];
  const rest = filtered.filter((_,i)=>i!==featIdx);

  let html = '';

  if(featured){
    const cats = (featured.categories||[]).map(c=>`<span class="cat">${esc(catZh(c))}</span>`).join('<span class="card-dot"></span>');
    html += `
      <article class="featured a2" onclick="openModal(${featIdx},this)">
        <h2 class="feat-title">${esc(featured.title)}</h2>
        <p class="feat-summary">${esc(featured.summary)}</p>
        <div class="feat-cats">${cats}</div>
      </article>
    `;
  }

  html += '<div class="news-list">';
  rest.forEach((item)=>{
    const originalIdx = filtered.indexOf(item);
    const cats = (item.categories||[]).map(c=>`<span class="cat">${esc(catZh(c))}</span>`).join('<span class="card-dot"></span>');
    html += `
      <button class="n-item" onclick="openModal(${originalIdx},this)">
        <div class="n-body">
          <div class="n-cats">${cats}</div>
          <div class="n-title">${esc(item.title)}</div>
          <div class="n-summary">${esc(item.summary)}</div>
        </div>
      </button>
    `;
  });
  html += '</div>';

  document.getElementById('contentArea').innerHTML = html;
  document.getElementById('totalStat').textContent = filtered.length;
}

// ── Modal ────────────────────────────────────────────────────────
// Haptic feedback (mobile)
function haptic(style){
  if(navigator.vibrate) navigator.vibrate(style==='heavy'?[12]:style==='light'?[4]:[8]);
}

window.openModal = function(filteredIdx, triggerEl){
  filteredCache = getFiltered();
  modalIdx = filteredIdx;
  ttsStop();
  renderModal();

  // Card tap animation
  if(triggerEl){
    triggerEl.classList.add('card-popping');
    setTimeout(()=>triggerEl.classList.remove('card-popping'), 672);
  }

  const ov = document.getElementById('mOv');
  const sh = document.getElementById('mSheet');
  ov.style.display = 'flex';
  sh.classList.remove('spring');
  void sh.offsetHeight;

  // Calculate aspect-ratio morph: start from card's proportions
  let startSx = 0.7, startSy = 0.7;
  if(triggerEl){
    const cardR = triggerEl.getBoundingClientRect();
    const shR = sh.getBoundingClientRect();
    startSx = Math.min(cardR.width / shR.width, 0.95);
    startSy = Math.min(cardR.height / shR.height, 0.7);
    const cx = cardR.left + cardR.width/2 - shR.left;
    const cy = cardR.top + cardR.height/2 - shR.top;
    sh.style.transformOrigin = cx + 'px ' + cy + 'px';
  } else {
    sh.style.transformOrigin = 'center center';
  }

  const delay = triggerEl ? 140 : 0;
  setTimeout(()=>{
    requestAnimationFrame(()=>{
      ov.classList.add('vis');
      sh.classList.add('vis');
      haptic('medium');

      // Two dimensions: size + aspect ratio morph simultaneously
      // Width narrows slightly at first then expands; height always grows
      const narrowSx = startSx * 0.92;  // width dips ~8%
      const midSy = startSy + (1 - startSy) * 0.35;  // height at ~35% progress
      const anim = sh.animate([
        { transform: `scaleX(${startSx}) scaleY(${startSy})`, opacity: 0, filter: 'blur(6px)' },
        { transform: `scaleX(${narrowSx}) scaleY(${startSy + (1-startSy)*0.12})`, opacity: 0.5, filter: 'blur(4px)', offset: 0.18 },
        { transform: `scaleX(${narrowSx*1.02}) scaleY(${midSy})`, opacity: 0.8, filter: 'blur(1.5px)', offset: 0.40 },
        { transform: 'scaleX(0.92) scaleY(0.88)', opacity: 0.95, filter: 'blur(0px)', offset: 0.60 },
        { transform: 'scaleX(1.01) scaleY(1.012)', opacity: 1, filter: 'blur(0px)', offset: 0.82 },
        { transform: 'scaleX(0.998) scaleY(0.997)', opacity: 1, filter: 'blur(0px)', offset: 0.92 },
        { transform: 'scaleX(1) scaleY(1)', opacity: 1, filter: 'blur(0px)' }
      ], {
        duration: 780,
        easing: 'cubic-bezier(.38,.05,.25,1)',
        fill: 'forwards'
      });
      anim.onfinish = () => {
        anim.cancel();
        sh.style.transformOrigin = 'center center';
      };
    });
    modalOpen = true;
    document.body.style.overflow = 'hidden';
    history.replaceState(null,'','#article-'+filteredIdx);
  }, delay);
};

window.closeModal = function(){
  haptic('light');
  ttsStop();
  const ov = document.getElementById('mOv');
  const sh = document.getElementById('mSheet');
  ov.classList.remove('vis'); sh.classList.remove('vis');
  setTimeout(()=>{ ov.style.display='none'; },220);
  modalOpen = false;
  document.body.style.overflow = ''; // restore scroll
  history.replaceState(null,'',location.pathname);
};

window.handleOvClick = function(e){
  if(e.target===e.currentTarget) closeModal();
};

let _slideDir = 0;
window.navModal = function(dir){
  haptic('light');
  const ni = modalIdx+dir;
  if(ni<0 || ni>=filteredCache.length) return;
  _slideDir=dir;
  const title = document.getElementById('mTitle');
  const body = document.getElementById('mBody');
  const outCls = dir>0 ? 'nav-out-l' : 'nav-out-r';
  const inCls  = dir>0 ? 'nav-in-l'  : 'nav-in-r';
  title.classList.add(outCls);
  body.classList.add(outCls);
  setTimeout(()=>{
    modalIdx=ni; ttsStop(); renderModal();
    // Remove out, add in (start from opposite side)
    title.classList.remove(outCls);
    body.classList.remove(outCls);
    title.classList.add(inCls);
    body.classList.add(inCls);
    // Force reflow then remove in class to trigger slide-in
    void title.offsetWidth;
    requestAnimationFrame(()=>{
      title.classList.remove(inCls);
      body.classList.remove(inCls);
    });
  }, 200);
};

function renderModal(){
  const item = filteredCache[modalIdx];
  if(!item) return;

  // meta row (category tags removed; TTS moved to top bar)

  // title
  document.getElementById('mTitle').textContent = item.title||'';

  // source
  document.getElementById('mSrc').textContent = src(item);

  // body
  let body = '<div class="m-content">';
  if(item.full_content && item.full_content.trim()){
    const paras = item.full_content.trim().split(/\n+/).filter(Boolean);
    body += paras.map(p=>`<p>${esc(p)}</p>`).join('');
  } else {
    body += `<p>${esc(item.summary||'')}</p>`;
  }
  body += '</div>';

  if(item.context && item.context.trim()){
    body += `<div class="m-ctx"><div class="m-ctx-lbl">背景</div><div class="m-ctx-txt">${esc(item.context)}</div></div>`;
  }
  if(item.tags && item.tags.length){
    body += `<div class="m-tags">${item.tags.map(t=>`<span class="m-tag">#${esc(t)}</span>`).join('')}</div>`;
  }

  const mBody = document.getElementById('mBody');
  // slide animation
  if(_slideDir!==0){
    const cls = _slideDir>0 ? 'slide-l' : 'slide-r';
    mBody.classList.remove('slide-l','slide-r');
    void mBody.offsetWidth; // reflow
    mBody.classList.add(cls);
    // also animate title
    const titleEl = document.getElementById('mTitle');
    titleEl.classList.remove('slide-l','slide-r');
    void titleEl.offsetWidth;
    titleEl.classList.add(cls);
    _slideDir=0;
  }
  mBody.innerHTML = body;
  mBody.scrollTop = 0;
  // reset progress
  document.getElementById('mProgressBar').style.width = '0%';
  mBody.onscroll = function(){
    const el = this;
    const pct = el.scrollHeight <= el.clientHeight ? 100
      : Math.min(100, Math.round(el.scrollTop / (el.scrollHeight - el.clientHeight) * 100));
    document.getElementById('mProgressBar').style.width = pct + '%';
  };

  // nav
  const hasPrev = modalIdx>0, hasNext = modalIdx<filteredCache.length-1;
  document.getElementById('btnMPrev').disabled = !hasPrev;
  document.getElementById('btnMNext').disabled = !hasNext;
  document.getElementById('mNavCnt').textContent = `${modalIdx+1} / ${filteredCache.length}`;
  // edge tap zones: only active when there's something to navigate to
  const tL=document.getElementById('tapL'), tR=document.getElementById('tapR');
  if(tL) tL.style.display = hasPrev ? 'block' : 'none';
  if(tR) tR.style.display = hasNext ? 'block' : 'none';

  // read link
  document.getElementById('btnRead').href = item.best_url||item.url||'#';

  // hash
  history.replaceState(null,'','#article-'+modalIdx);
}

// ── Keyboard & swipe ────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if(e.key==='Escape'){
    if(modalOpen) closeModal();
    else if(archOpen) closeArch();
  }
  if(modalOpen){
    if(e.key==='ArrowLeft') navModal(-1);
    if(e.key==='ArrowRight') navModal(1);
  }
});

const mOvEl = document.getElementById('mOv');
// Block browser swipe-back/forward when modal is open
mOvEl.addEventListener('touchstart', function(e){
  touchX0 = e.touches[0].clientX; touchT0 = Date.now();
},{passive:true});
mOvEl.addEventListener('touchmove', function(e){
  if(!modalOpen) return;
  const dx = Math.abs(e.touches[0].clientX - (touchX0||0));
  const dy = Math.abs(e.touches[0].clientY - (e.touches[0].clientY)); // always 0, just guard
  // If horizontal movement dominates, block browser navigation gesture
  if(dx > 8) e.preventDefault();
},{passive:false});
mOvEl.addEventListener('touchend', function(e){
  if(touchX0===null) return;
  const dx = e.changedTouches[0].clientX - touchX0;
  const dt = Date.now() - touchT0;
  touchX0=null;
  if(dt>400||Math.abs(dx)<50) return;
  if(window.getSelection&&window.getSelection().toString()) return;
  navModal(dx>0 ? -1 : 1);
},{passive:true});

// ── TTS ──────────────────────────────────────────────────────────
const synth = window.speechSynthesis;
let ttsState=0, ttsUtt=null, ttsAudio=null, ttsMode='none';

const SVG_SPK='<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>';
const SVG_PAU='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';

function updateTtsBtn(){
  const btn=document.getElementById('btnTts');
  const ico=document.getElementById('ttsIcon');
  if(!btn) return;
  btn.classList.toggle('playing', ttsState===1);
  ico.innerHTML = ttsState===1 ? SVG_PAU : SVG_SPK;
}

function ttsStop(){
  if(ttsMode==='speech'&&synth) synth.cancel();
  if(ttsMode==='audio'&&ttsAudio){ttsAudio.pause();ttsAudio=null;}
  ttsState=0;ttsMode='none';ttsUtt=null;updateTtsBtn();
}

function pickVoice(){
  if(!synth) return null;
  const vv=synth.getVoices();
  // Prefer calm/neutral female voices; avoid expressive/cheerful ones
  const pref=[
    'Microsoft Xiaomo','Microsoft Xiaohan',   // calm neutral zh-CN
    'Microsoft Yunxi',                          // neutral male fallback
    'Tingting','Meijia',                        // macOS zh
    'Microsoft Xiaoxiao',                       // slightly warmer but acceptable
    'Yu-shu','Microsoft Huihui','Microsoft Yaoyao',
  ];
  for(const n of pref){ const v=vv.find(v=>v.name.includes(n)); if(v) return v; }
  return vv.find(v=>v.lang==='zh-CN')||vv.find(v=>v.lang.startsWith('zh'))||null;
}

function startWebSpeech(){
  if(!synth) return;
  const item=filteredCache[modalIdx];
  if(!item) return;
  const text=(item.title+'。'+(item.full_content||item.summary||'')).replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
  ttsUtt=new SpeechSynthesisUtterance(text);
  ttsUtt.lang='zh-CN'; ttsUtt.rate=0.92; ttsUtt.pitch=0.82;
  const setV=()=>{const v=pickVoice();if(v)ttsUtt.voice=v;};
  setV();
  if(!synth.getVoices().length) synth.addEventListener('voiceschanged',setV,{once:true});
  ttsMode='speech';
  ttsUtt.onstart=()=>{ttsState=1;updateTtsBtn();};
  ttsUtt.onpause=()=>{ttsState=2;updateTtsBtn();};
  ttsUtt.onresume=()=>{ttsState=1;updateTtsBtn();};
  ttsUtt.onend=ttsUtt.onerror=()=>{ttsState=0;ttsMode='none';updateTtsBtn();};
  synth.speak(ttsUtt);
}

window.toggleTts=function(){
  if(ttsState===1){
    if(ttsMode==='speech'&&synth){synth.pause();ttsState=2;updateTtsBtn();return;}
    if(ttsMode==='audio'&&ttsAudio){ttsAudio.pause();return;}
  }
  if(ttsState===2){
    if(ttsMode==='speech'&&synth){synth.resume();ttsState=1;updateTtsBtn();return;}
    if(ttsMode==='audio'&&ttsAudio){ttsAudio.play();return;}
  }
  ttsStop();
  const item=filteredCache[modalIdx];
  if(!item) return;
  if(item.audio_url){
    ttsAudio=new Audio(item.audio_url);
    ttsMode='audio';
    ttsAudio.onplay=()=>{ttsState=1;updateTtsBtn();};
    ttsAudio.onpause=()=>{if(ttsAudio&&!ttsAudio.ended){ttsState=2;updateTtsBtn();}};
    ttsAudio.onended=()=>{ttsState=0;ttsAudio=null;updateTtsBtn();};
    ttsAudio.onerror=()=>{ttsAudio=null;ttsMode='none';startWebSpeech();};
    ttsAudio.play().catch(()=>{ttsAudio=null;ttsMode='none';startWebSpeech();});
  } else {
    startWebSpeech();
  }
};

// ── loadDateData (archive switching) ────────────────────────────
window.loadDateData = function(date){
  fetch('data/'+date+'.json')
    .then(r=>r.json())
    .then(data=>{
      const sorted=(data.articles||[]).slice().sort((a,b)=>(b.heat||0)-(a.heat||0));
      window.ARTICLES_DATA=sorted;
      window.calendarSetDate(date);
      // update sources count
      const hosts=new Set(sorted.map(a=>{try{return new URL(a.best_url||a.url||'').hostname;}catch{return '';}}).filter(Boolean));
      document.getElementById('srcStat').textContent=hosts.size||data.sources||'?';
      curCat='全部';
      renderFilterBar();
      renderContent();
    })
    .catch(err=>console.error('loadDateData error:',err));
};

// ── Init ─────────────────────────────────────────────────────────
updateArchLabel();
updateHeroTitle();
updateNavBtns();
renderFilterBar();
renderContent();

// Enter animation
setTimeout(()=>{ document.getElementById('mainWrap').classList.add('entered'); }, 60);

// Deep link
const hash = location.hash;
if(hash && hash.startsWith('#article-')){
  const idx=parseInt(hash.slice(9));
  if(!isNaN(idx)) setTimeout(()=>openModal(idx),300);
}

})();
