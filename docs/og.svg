<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080f"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- glow circles -->
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="rgba(0,245,255,0.06)"/>
  <ellipse cx="1000" cy="450" rx="250" ry="180" fill="rgba(168,85,247,0.08)"/>
  <!-- top bar -->
  <rect x="80" y="80" width="120" height="4" rx="2" fill="url(#accent)"/>
  <!-- icon -->
  <rect x="80" y="110" width="60" height="60" rx="14" fill="url(#accent)" opacity="0.9"/>
  <text x="110" y="152" font-size="32" text-anchor="middle">🤖</text>
  <!-- title -->
  <text x="160" y="140" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0">AI Daily</text>
  <text x="160" y="168" font-family="monospace" font-size="16" fill="#64748b">powered by 小豹包🍞</text>
  <!-- divider -->
  <rect x="80" y="200" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <!-- main text -->
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#e2e8f0">每日 AI 资讯看板</text>
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="28" fill="#64748b">融资动态 · 模型发布 · 产品资讯 · 政策监管</text>
  <!-- tags -->
  <rect x="80" y="420" width="130" height="40" rx="8" fill="rgba(251,191,36,0.15)"/>
  <text x="145" y="446" font-family="Arial" font-size="18" fill="#fbbf24" text-anchor="middle">💰 融资</text>
  <rect x="226" y="420" width="130" height="40" rx="8" fill="rgba(0,245,255,0.12)"/>
  <text x="291" y="446" font-family="Arial" font-size="18" fill="#00f5ff" text-anchor="middle">🧠 模型</text>
  <rect x="372" y="420" width="130" height="40" rx="8" fill="rgba(168,85,247,0.15)"/>
  <text x="437" y="446" font-family="Arial" font-size="18" fill="#a855f7" text-anchor="middle">📦 产品</text>
  <rect x="518" y="420" width="130" height="40" rx="8" fill="rgba(236,72,153,0.15)"/>
  <text x="583" y="446" font-family="Arial" font-size="18" fill="#ec4899" text-anchor="middle">📜 政策</text>
  <!-- bottom url -->
  <text x="80" y="570" font-family="monospace" font-size="20" fill="#64748b">shujie-xu.github.io/ai-daily</text>
