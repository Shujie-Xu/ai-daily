<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Daily OG</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #f0f0f4;
      font-family: 'Noto Sans CJK SC', 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
      color: #09090b;
    }
    body {
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(9, 9, 11, 0.03), transparent 28%),
        radial-gradient(circle at bottom left, rgba(9, 9, 11, 0.025), transparent 22%),
        linear-gradient(180deg, #f4f4f7 0%, #f0f0f4 100%);
    }
    body::before {
      content: "";
      position: absolute;
      top: 26px;
      left: 32px;
      width: 180px;
      height: 3px;
      background: #09090b;
      border-radius: 999px;
    }
    .frame {
      position: relative;
      height: 100%;
      padding: 40px 52px 50px;
      display: flex;
      flex-direction: column;
    }
    .card {
      height: 100%;
      border: 1px solid #d8d8de;
      border-radius: 28px;
      background: rgba(255,255,255,0.34);
      padding: 30px 36px 30px;
      display: flex;
      flex-direction: column;
      box-shadow: -7px -7px 14px rgba(255,255,255,0.9), 7px 7px 14px rgba(174,174,192,0.28);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
    }
    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.34em;
      color: #09090b;
    }
    .date {
      font-size: 18px;
      color: #71717a;
      letter-spacing: 0.03em;
    }
    .list {
      display: grid;
      gap: 16px;
      flex: 1;
      align-content: start;
      padding-top: 2px;
    }
    .item {
      display: grid;
      grid-template-columns: 56px 1fr;
      column-gap: 20px;
      align-items: start;
    }
    .idx {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      color: #71717a;
      letter-spacing: 0.08em;
      padding-top: 4px;
    }
    .title {
      font-size: 33px;
      line-height: 1.28;
      font-weight: 700;
      color: #09090b;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-word;
    }
    .footer {
      padding-top: 14px;
      border-top: 1px solid #d8d8de;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      position: relative;
    }
    .footer::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 120px;
      height: 2px;
      background: #09090b;
      border-radius: 999px;
    }
    .meta {
      font-size: 20px;
      color: #71717a;
      letter-spacing: 0.02em;
    }
    .pill {
      padding: 9px 15px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid #d8d8de;
      font-size: 15px;
      color: #71717a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="topbar">
        <div class="brand">AI DAILY</div>
        <div class="date">{{DATE_DISPLAY}}</div>
      </div>

      <div class="list">
        <div class="item">
          <div class="idx">01</div>
          <div class="title">{{T1}}</div>
        </div>
        <div class="item">
          <div class="idx">02</div>
          <div class="title">{{T2}}</div>
        </div>
        <div class="item">
          <div class="idx">03</div>
          <div class="title">{{T3}}</div>
        </div>
      </div>

      <div class="footer">
        <div class="meta">今日 {{TOTAL}} 条 AI 新闻</div>
        <div class="pill">AI Daily</div>
      </div>
    </div>
  </div>
</body>
</html>
