<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Daily · {{DATE}}</title>
  <meta property="og:title" content="🤖 AI 日报 · {{DATE}}"/>
  <meta property="og:description" content="{{OG_DESC}}"/>
  <meta property="og:image" content="https://shujie-xu.github.io/ai-daily/og.png"/>
  <meta property="og:url" content="https://shujie-xu.github.io/ai-daily/"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="🤖 AI 日报 · {{DATE}}"/>
  <meta name="twitter:description" content="{{OG_DESC}}"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

    /* ── Dark theme (default) ───────────────────────────────── */
    :root {
      --bg:      #08080f;
      --bg2:     #0d0d1a;
      --card-bg: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --cyan:    #00f5ff;
      --purple:  #a855f7;
      --pink:    #ec4899;
      --green:   #22d3ee;
      --yellow:  #fbbf24;
      --text:    #e2e8f0;
      --text2:   #c0ccdc;
      --muted:   #64748b;
      --modal-bg:#0f0f1e;
      --shadow:  rgba(0,0,0,0.7);
      --matrix:  #00ff41;
    }

    /* ── Light theme ────────────────────────────────────────── */
    [data-theme="light"] {
      --bg:      #f0f3fa;
      --bg2:     #e8ecf5;
      --card-bg: rgba(255,255,255,0.85);
      --border:  rgba(0,0,0,0.09);
      --cyan:    #0099aa;
      --purple:  #7c3aed;
      --pink:    #db2777;
      --green:   #0891b2;
      --yellow:  #d97706;
      --text:    #1e293b;
      --text2:   #334155;
      --muted:   #64748b;
      --modal-bg:#ffffff;
      --shadow:  rgba(0,0,0,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'PingFang SC', 'Heiti SC', 'STHeiti', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* Ambient background (dark only) */
    [data-theme="dark"] body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(0,245,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(168,85,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(236,72,153,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Scan lines (dark only) */
    [data-theme="dark"] body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
      pointer-events: none;
      z-index: 999;
    }

    /* ── Terminal bar (dark only) ───────────────────────────── */
    .terminal-bar {
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace;
      font-size: 12px;
      color: var(--matrix);
      padding: 7px 0;
      border-bottom: 1px solid rgba(0,255,65,0.12);
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.85;
      overflow: hidden;
      white-space: nowrap;
    }
    [data-theme="light"] .terminal-bar {
      color: #0a7a3a;
      border-bottom-color: rgba(10,122,58,0.15);
      opacity: 0.65;
    }
    [data-theme="light"] .terminal-prompt { color: rgba(10,122,58,0.45); }
    [data-theme="light"] .terminal-path   { color: #0077aa; }
    [data-theme="light"] .terminal-cmd    { color: #0a7a3a; }
    [data-theme="light"] .terminal-arg    { color: #7c3aed; }
    [data-theme="light"] .terminal-cursor { background: #0a7a3a; }

    .terminal-prompt { color: rgba(0,255,65,0.5); }
    .terminal-path   { color: rgba(0,245,255,0.7); }
    .terminal-cmd    { color: var(--matrix); }
    .terminal-arg    { color: rgba(168,85,247,0.8); }

    .terminal-cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: var(--matrix);
      animation: blink 1.1s step-end infinite;
      vertical-align: middle;
      margin-left: 1px;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── Glitch effect on logo text ─────────────────────────── */
    @keyframes glitch {
      0%   { clip-path: inset(40% 0 61% 0); transform: translate(-2px, 0); }
      20%  { clip-path: inset(92% 0 1% 0);  transform: translate(2px, 0); }
      40%  { clip-path: inset(43% 0 15% 0); transform: translate(-1px, 0); }
      60%  { clip-path: inset(25% 0 58% 0); transform: translate(0, 0); }
      80%  { clip-path: inset(54% 0 7% 0);  transform: translate(2px, 0); }
      100% { clip-path: inset(58% 0 43% 0); transform: translate(-1px, 0); }
    }
    .logo-text {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      position: relative;
    }
    .logo-text::before,
    .logo-text::after {
      content: attr(data-text);
      position: absolute; left: 0; top: 0;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      opacity: 0;
    }
    .logo-text:hover::before {
      opacity: 0.7;
      animation: glitch 0.4s steps(1) infinite;
      color: var(--cyan);
    }
    .logo-text:hover::after {
      opacity: 0.5;
      animation: glitch 0.4s steps(1) 0.15s infinite reverse;
      color: var(--purple);
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(0,245,255,0.4), 0 0 50px rgba(0,245,255,0.12), inset 0 1px 0 rgba(255,255,255,0.2);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0,245,255,0.4), 0 0 50px rgba(0,245,255,0.12); }
      50%       { box-shadow: 0 0 28px rgba(168,85,247,0.5), 0 0 60px rgba(168,85,247,0.15); }
    }
    [data-theme="light"] .logo-icon {
      animation: logoPulseLight 3s ease-in-out infinite;
      box-shadow: 0 2px 12px rgba(0,153,170,0.35);
    }
    @keyframes logoPulseLight {
      0%, 100% { box-shadow: 0 2px 12px rgba(0,153,170,0.35); }
      50%       { box-shadow: 0 2px 18px rgba(124,58,237,0.4); }
    }

    .logo-sub { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace; }

    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* Theme toggle */
    .theme-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    .theme-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    .date-badge {
      background: var(--card-bg);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace;
      font-size: 13px;
      color: var(--cyan);
      display: flex; align-items: center; gap: 8px;
      white-space: nowrap;
    }
    [data-theme="dark"] .date-badge {
      box-shadow: 0 0 12px rgba(0,245,255,0.08), inset 0 0 8px rgba(0,245,255,0.03);
    }

    .pulse {
      width: 8px; height: 8px;
      background: var(--cyan);
      border-radius: 50%;
      animation: pulse 2s infinite;
      box-shadow: 0 0 0 0 rgba(0,245,255,0.4);
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(0,245,255,0.4); }
      70%  { box-shadow: 0 0 0 8px rgba(0,245,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,245,255,0); }
    }

    /* ── Stats bar ──────────────────────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 24px 0;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      transition: all 0.2s;
      position: relative;
    }
    .stat-card:hover { border-color: rgba(0,245,255,0.3); box-shadow: 0 0 16px rgba(0,245,255,0.06); }
    .stat-card::before {
      content: '> ';
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace;
      font-size: 10px;
      position: absolute;
      top: 8px; left: 10px;
    }
    [data-theme="dark"]  .stat-card::before { color: rgba(0,255,65,0.35); }
    [data-theme="light"] .stat-card::before { color: rgba(10,122,58,0.3); }

    .stat-value {
      font-size: 28px; font-weight: 700;
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Category filter bar ────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .filter-tag {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      user-select: none;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .filter-tag:hover { opacity: 0.85; }
    .filter-tag.active { opacity: 1; }
    .filter-count {
      font-size: 10px; font-weight: 400;
      opacity: 0.65;
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace;
    }
    .filter-tag[data-cat="all"]         { color: var(--text); border-color: var(--border); }
    .filter-tag[data-cat="all"].active  { background: var(--text); color: var(--bg); border-color: var(--text); }
    .filter-tag[data-cat="model"]       { color: var(--cyan); border-color: rgba(0,245,255,0.3); }
    .filter-tag[data-cat="model"].active    { background: rgba(0,245,255,0.15); border-color: var(--cyan); }
    .filter-tag[data-cat="product"]     { color: var(--purple); border-color: rgba(168,85,247,0.3); }
    .filter-tag[data-cat="product"].active  { background: rgba(168,85,247,0.15); border-color: var(--purple); }
    .filter-tag[data-cat="funding"]     { color: var(--yellow); border-color: rgba(251,191,36,0.3); }
    .filter-tag[data-cat="funding"].active  { background: rgba(251,191,36,0.2); border-color: var(--yellow); }
    .filter-tag[data-cat="finance"]     { color: #fb923c; border-color: rgba(251,146,60,0.3); }
    .filter-tag[data-cat="finance"].active  { background: rgba(251,146,60,0.15); border-color: #fb923c; }
    .filter-tag[data-cat="research"]    { color: var(--green); border-color: rgba(34,211,238,0.3); }
    .filter-tag[data-cat="research"].active { background: rgba(34,211,238,0.12); border-color: var(--green); }
    .filter-tag[data-cat="policy"]      { color: var(--pink); border-color: rgba(236,72,153,0.3); }
    .filter-tag[data-cat="policy"].active   { background: rgba(236,72,153,0.12); border-color: var(--pink); }
    .filter-tag[data-cat="event"]       { color: #a3e635; border-color: rgba(163,230,53,0.3); }
    .filter-tag[data-cat="event"].active    { background: rgba(163,230,53,0.12); border-color: #a3e635; }

    /* ── News grid ──────────────────────────────────────────── */
    .news-section { margin-bottom: 48px; }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .section-line  { flex: 1; height: 1px; background: var(--border); }
    .heat-label    { font-size: 18px; }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .news-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
    }
    [data-theme="light"] .news-card { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    [data-theme="light"] .news-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.1), 0 0 16px rgba(0,153,170,0.12); }

    .news-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      opacity: 0; transition: opacity 0.25s;
    }
    .news-card:hover { border-color: rgba(0,245,255,0.38); transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow), 0 0 24px rgba(0,245,255,0.08), 0 0 1px rgba(0,245,255,0.25); }
    .news-card:hover::before { opacity: 1; }

    /* Read state */
    .news-card.read .card-title { opacity: 0.55; }
    .news-card.read::after {
      content: '✓'; position: absolute; top: 10px; right: 10px;
      font-size: 10px; color: var(--muted); opacity: 0.5;
    }

    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .card-cats { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.3px; }
    .badge-model      { background: rgba(0,245,255,0.12);   color: var(--cyan); }
    .badge-product    { background: rgba(168,85,247,0.15);  color: var(--purple); }
    .badge-funding    { background: rgba(251,191,36,0.15);  color: var(--yellow); }
    .badge-finance    { background: rgba(251,146,60,0.15);  color: #fb923c; }
    .badge-research   { background: rgba(34,211,238,0.12);  color: var(--green); }
    .badge-policy     { background: rgba(236,72,153,0.15);  color: var(--pink); }
    .badge-event      { background: rgba(163,230,53,0.12);  color: #a3e635; }

    /* Tag pills (free-form, within card & detail) */
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .tag-pill {
      font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 999px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted); letter-spacing: 0.2px;
    }
    [data-theme="light"] .tag-pill { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }

    .heat-score { font-size: 14px; white-space: nowrap; }

    .card-title   { font-size: 16px; font-weight: 600; line-height: 1.5; color: var(--text); }
    .card-summary { font-size: 14px; color: var(--muted); line-height: 1.65; flex: 1; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .card-source { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace; }
    .card-cta    { font-size: 12px; color: var(--cyan); opacity: 0.7; }

    /* Featured card */
    .news-card.featured {
      grid-column: 1 / -1; flex-direction: row; gap: 24px;
      background: linear-gradient(135deg, rgba(0,245,255,0.06), rgba(168,85,247,0.06));
      border-color: rgba(0,245,255,0.15);
    }
    [data-theme="light"] .news-card.featured { background: linear-gradient(135deg, rgba(0,153,170,0.06), rgba(124,58,237,0.06)); }
    .news-card.featured .card-title { font-size: 18px; }
    .news-card.featured .featured-accent {
      width: 4px; min-width: 4px; border-radius: 999px;
      background: linear-gradient(to bottom, var(--cyan), var(--purple));
    }

    /* ── Archive Date Pill ──────────────────────────────────── */
    .archive-cal-section { margin-bottom: 24px; }

    /* Wrapper — block so calendar panel gets full column width */
    .archive-pill-wrap { display: block; }

    /* Date toggle button — shows only the date when collapsed */
    .archive-date-toggle {
      display: inline-flex; align-items: center;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 13px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      color: var(--text); cursor: pointer; transition: all 0.18s;
      white-space: nowrap;
    }
    .archive-date-toggle:hover { border-color: rgba(0,245,255,0.3); color: var(--cyan); }
    .archive-date-toggle.open  {
      border-color: rgba(0,245,255,0.3); color: var(--cyan);
      background: rgba(0,245,255,0.06);
    }
    /* Chevron: hidden (width=0) when closed, slides in when open */
    .archive-pill-chevron {
      display: block; overflow: hidden;
      width: 0; opacity: 0; margin-left: 0;
      transition: width 0.18s, opacity 0.18s, margin 0.18s, transform 0.22s;
      flex-shrink: 0;
    }
    .archive-date-toggle.open .archive-pill-chevron {
      width: 12px; opacity: 1; margin-left: 6px; transform: rotate(180deg);
    }

    /* Calendar panel (expanded view) */
    .archive-cal-panel { margin-top: 10px; display: none; }
    .cal-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 24px 22px;
      max-width: 360px;
    }
    [data-theme="light"] .cal-card { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-month-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .cal-nav-btn {
      background: var(--card-bg); border: 1px solid var(--border);
      color: var(--muted); width: 28px; height: 28px; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; padding: 0;
    }
    .cal-nav-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .cal-weekdays span {
      font-size: 11px; color: var(--muted); font-weight: 500;
      text-align: center; padding: 3px 0;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 14px; cursor: default; user-select: none;
    }
    .cal-today {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #fff; font-weight: 700; cursor: pointer;
      box-shadow: 0 2px 10px rgba(0,245,255,0.25);
    }
    .cal-has {
      color: var(--text); font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .cal-has:hover { background: rgba(0,245,255,0.12); color: var(--cyan); }
    .cal-none  { color: var(--muted); opacity: 0.35; }
    .cal-other { color: var(--muted); opacity: 0.18; }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border); padding: 24px 0; margin-top: 40px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .footer-text  { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace; }
    .footer-tick  { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace; }
    [data-theme="dark"]  .footer-tick { color: rgba(0,255,65,0.55); }
    [data-theme="light"] .footer-tick { color: rgba(10,122,58,0.55); }
    .footer-brand { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .footer-brand span {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600;
    }

    /* ── Back to top ────────────────────────────────────────── */
    .back-to-top {
      position: fixed; bottom: 28px; right: 24px; z-index: 500;
      width: 40px; height: 40px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      opacity: 0; transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
    .back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
    .back-to-top:hover   { border-color: var(--cyan); color: var(--cyan); }

    /* ── Detail Modal ───────────────────────────────────────── */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0px);
      transition: background 0.25s ease, backdrop-filter 0.25s ease;
      pointer-events: none;
    }
    .detail-overlay.open {
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      pointer-events: all;
    }
    [data-theme="light"] .detail-overlay.open { background: rgba(0,0,20,0.45); }

    .detail-card {
      position: relative;
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 32px 80px var(--shadow), 0 0 0 1px rgba(0,245,255,0.06);
      width: 100%; max-width: 720px; max-height: 88vh;
      display: flex; flex-direction: column;
      transform: scale(0.92) translateY(16px); opacity: 0;
      transition: transform 0.28s cubic-bezier(0.34,1.3,0.64,1), opacity 0.22s ease;
      overflow: hidden;
    }
    .detail-overlay.open .detail-card { transform: scale(1) translateY(0); opacity: 1; }

    /* Reading progress bar */
    .detail-progress {
      position: absolute; top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      transition: width 0.1s linear;
      border-radius: 0 2px 0 0;
      z-index: 3;
    }

    .detail-topbar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .detail-pager { flex: 1; font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace; font-size: 12px; color: var(--muted); text-align: center; }

    .detail-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      width: 34px; height: 34px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0;
    }
    .detail-btn:hover:not(:disabled) { border-color: rgba(0,245,255,0.45); color: var(--cyan); background: rgba(0,245,255,0.07); }
    .detail-btn:disabled { opacity: 0.25; cursor: default; }
    .detail-btn.close:hover:not(:disabled) { border-color: rgba(236,72,153,0.45); color: var(--pink); background: rgba(236,72,153,0.07); }

    /* TTS button */
    .detail-btn.tts.playing {
      border-color: rgba(34,211,238,0.55); color: var(--green);
      background: rgba(34,211,238,0.1);
      animation: ttsPulse 1.6s ease-in-out infinite;
    }
    .detail-btn.tts.paused { border-color: rgba(251,191,36,0.45); color: var(--yellow); background: rgba(251,191,36,0.07); }
    @keyframes ttsPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,211,238,0.3); }
      50%      { box-shadow: 0 0 0 6px rgba(34,211,238,0); }
    }

    /* Swipe hint (mobile) */
    .swipe-hint { font-size: 11px; color: var(--muted); text-align: center; padding: 5px 0 2px; flex-shrink: 0; }
    @media (min-width: 600px) { .swipe-hint { display: none; } }

    .detail-scroll {
      flex: 1; overflow-y: auto;
      overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
    }

    .detail-body { padding: 26px 28px 32px; }
    @media (max-width: 480px) { .detail-body { padding: 18px 16px 28px; } }

    .detail-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .detail-heat { font-size: 15px; }

    .detail-title { font-size: 21px; font-weight: 700; line-height: 1.45; color: var(--text); margin-bottom: 20px; }
    @media (max-width: 480px) { .detail-title { font-size: 18px; } }

    .detail-content-body { font-size: 15.5px; line-height: 1.9; color: var(--text2); }
    .detail-content-body p { margin-bottom: 14px; }
    .detail-content-body p:last-child { margin-bottom: 0; }
    .detail-content-body h3 { font-size: 13px; font-weight: 600; color: var(--cyan); margin: 22px 0 8px; text-transform: uppercase; letter-spacing: 0.6px; }
    .detail-content-body ul { padding-left: 18px; margin-bottom: 14px; }
    .detail-content-body li { margin-bottom: 7px; }
    .detail-content-body strong { color: var(--text); font-weight: 600; }

    .detail-divider { height: 1px; background: var(--border); margin: 22px 0; }

    /* Context / background box */
    .detail-context {
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.14);
      border-radius: 12px;
      padding: 16px 18px;
      margin-top: 20px;
    }
    [data-theme="light"] .detail-context { background: rgba(0,153,170,0.04); border-color: rgba(0,153,170,0.2); }
    .detail-context-label {
      font-size: 10px; font-weight: 600; color: var(--cyan);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px; font-family: 'JetBrains Mono', monospace;
      display: flex; align-items: center; gap: 5px;
    }
    .detail-context-body { font-size: 14px; line-height: 1.8; color: var(--text2); }
    .detail-context-body p { margin-bottom: 10px; }
    .detail-context-body p:last-child { margin-bottom: 0; }

    .detail-source-box {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(128,128,128,0.06); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px; gap: 14px; flex-wrap: wrap;
    }
    .detail-source-label  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace; }
    .detail-source-domain { font-size: 12px; color: var(--text); font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace; }

    .detail-read-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, rgba(0,245,255,0.14), rgba(168,85,247,0.14));
      border: 1px solid rgba(0,245,255,0.22);
      color: var(--cyan); text-decoration: none;
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      transition: all 0.18s; white-space: nowrap;
    }
    .detail-read-link:hover { background: linear-gradient(135deg, rgba(0,245,255,0.22), rgba(168,85,247,0.22)); border-color: rgba(0,245,255,0.4); }

    /* Keyboard hint */
    .kbd-hint { font-size: 11px; color: var(--muted); text-align: center; padding: 8px 0 4px; flex-shrink: 0; font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', 'Heiti SC', monospace; }
    @media (max-width: 600px) { .kbd-hint { display: none; } }

    /* Slide animations */
    @keyframes slideInRight { from { opacity:0; transform:translateX(28px);} to { opacity:1; transform:translateX(0);} }
    @keyframes slideInLeft  { from { opacity:0; transform:translateX(-28px);} to { opacity:1; transform:translateX(0);} }
    .anim-right { animation: slideInRight 0.2s ease; }
    .anim-left  { animation: slideInLeft  0.2s ease; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      .news-card.featured { flex-direction: column; }
      .news-card.featured .featured-accent { width: 100%; min-width: unset; height: 4px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .detail-overlay { padding: 10px 8px; }
      .detail-card { max-height: 93vh; border-radius: 16px; }
      .header-inner { flex-wrap: wrap; }
    }
  </style>
  <!-- Shared archive dates — updated daily, loaded by all pages -->
  <script src="./archive.js"></script>
</head>
<body>
<div class="container">
  <!-- Terminal command bar (dark mode only) -->
  <div class="terminal-bar">
    <span class="terminal-prompt">~$</span>
    <span class="terminal-path">ai-daily</span>
    <span class="terminal-cmd">--fetch</span>
    <span class="terminal-arg">--date {{DATE}}</span>
    <span class="terminal-cmd">--push</span>
    <span class="terminal-cursor"></span>
  </div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🤖</div>
        <div>
          <div class="logo-text" data-text="AI Daily">AI Daily</div>
          <div class="logo-sub">powered by 小豹包</div>
        </div>
      </div>
      <div class="header-right">
        <button class="theme-btn" id="themeBtn" title="切换亮/暗色" onclick="toggleTheme()">🌙</button>
        <div class="date-badge" id="display-date-badge">
          <div class="pulse"></div>
          <span id="display-date">{{DATE}}</span>
          <span id="display-edit-time" style="color:var(--muted);margin-left:6px;font-size:11px;">edit: {{EDIT_TIME}}</span>
        </div>
      </div>

  </header>

  <!-- Archive calendar -->
  {{ARCHIVE_NAV}}

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="stat-total" data-target="{{TOTAL}}">0</div><div class="stat-label">今日新闻</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-sources" data-target="{{SOURCES}}">0</div><div class="stat-label">信息来源</div></div>
  </div>

  <!-- Category filter bar -->
  <div id="filter-bar-container">{{FILTER_BAR}}</div>

  <!-- News sections -->

  <footer>
    <div class="footer-text"><span class="footer-tick">✓</span> {{SEARCH_COUNT}} queries · {{DIMENSIONS}} dims</div>
    <div class="footer-brand">powered by <span>小豹包🍞</span></div>
  </footer>
</div>

<!-- Back to top -->
<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- Detail Modal -->
<div class="detail-overlay" id="detailOverlay" role="dialog" aria-modal="true" onclick="handleBackdropClick(event)">
  <div class="detail-card" id="detailCard">
    <div class="detail-progress" id="detailProgress"></div>

    <div class="detail-topbar">
      <button class="detail-btn" id="btnPrev" onclick="navigateDetail(-1)" title="上一条 (←)">‹</button>
      <div class="detail-pager" id="detailPager">1 / 1</div>
      <button class="detail-btn" id="btnNext" onclick="navigateDetail(1)" title="下一条 (→)">›</button>
      <button class="detail-btn tts" id="btnTts" onclick="toggleTts()" title="朗读正文">
        <svg id="ttsIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5L6 9H3v6h3l5 4V5z"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
      <button class="detail-btn" id="btnShare" onclick="shareArticle()" title="分享">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
      <button class="detail-btn close" onclick="closeDetail()" title="关闭 (Esc)">✕</button>
    </div>

    <div class="swipe-hint">← 左右滑动切换 →</div>

    <div class="detail-scroll" id="detailScroll">
      <div class="detail-body" id="detailBody"></div>
    </div>

    <div class="kbd-hint">← → 切换 &nbsp;·&nbsp; Esc 关闭</div>
  </div>
</div>

<script>window.ARTICLES_DATA = {{ARTICLES_JSON}};

// ── 客户端渲染函数（与 generate.js 保持一致）─────────────────────
const CAT_BADGE = { model:'badge-model', product:'badge-product', funding:'badge-funding',
  finance:'badge-finance', research:'badge-research', policy:'badge-policy', event:'badge-event' };
const CAT_LABEL = { model:'🧠 模型', product:'📦 产品', funding:'💰 融资',
  finance:'📊 财务', research:'🔬 研究', policy:'📜 政策', event:'🎪 事件' };

function clientRenderCard(item, featured, idx) {
  const cats = (item.categories||['product']).map(c =>
    `<span class="badge ${CAT_BADGE[c]||'badge-product'}">${CAT_LABEL[c]||c}</span>`).join('');
  const tags = (item.tags||[]).map(t => `<span class="tag-pill">#${t}</span>`).join('');
  const tagsHtml = tags ? `<div class="card-tags">${tags}</div>` : '';
  const domain = (() => { try { return new URL(item.url).hostname.replace('www.',''); } catch { return ''; }})();
  return `<div class="${featured?'news-card featured':'news-card'}" data-idx="${idx}"
    data-cats="${(item.categories||['product']).join(' ')}"
    onclick="openDetail(${idx})" role="button" tabindex="0"
    onkeydown="if(event.key==='Enter'||event.key===' ')openDetail(${idx})">
    ${featured?'<div class="featured-accent"></div>':''}
    <div style="flex:1;display:flex;flex-direction:column;gap:12px;">
      <div class="card-top"><div class="card-cats">${cats}</div></div>
      <div class="card-title">${item.title}</div>
      ${tagsHtml}
      <div class="card-summary">${item.summary}</div>
      <div class="card-footer"><span class="card-source">${domain}</span><span class="card-cta">查看详情 →</span></div>
    </div></div>`;
}

function clientRenderSections(articles) {
  const groups = [
    {min:5,label:'🔥🔥🔥🔥🔥 顶级热点'},{min:4,label:'🔥🔥🔥🔥 高热度'},
    {min:3,label:'🔥🔥🔥 中等热度'},{min:0,label:'🔥🔥 值得关注'}];
  const sorted = [...articles].sort((a,b)=>(b.heat||3)-(a.heat||3));
  const idxMap = new Map(sorted.map((a,i)=>[a,i]));
  let html = '';
  for (let i=0;i<groups.length;i++) {
    const g=groups[i], prevMin=groups[i-1]?.min??99;
    const items=sorted.filter(a=>(a.heat||3)>=g.min&&(a.heat||3)<prevMin);
    if (!items.length) continue;
    const cards=items.map((item,li)=>clientRenderCard(item,i===0&&li===0,idxMap.get(item))).join('');
    html+=`<div class="news-section"><div class="section-header">
      <span class="heat-label">${g.label.split(' ')[0]}</span>
      <span class="section-title">${g.label.split(' ').slice(1).join(' ')}</span>
      <div class="section-line"></div></div>
      <div class="news-grid">${cards}</div></div>`;
  }
  return { html, sortedArticles: sorted };
}

function clientRenderFilterBar(articles) {
  const CAT_ORDER=['model','product','funding','finance','research','policy','event'];
  const counts={};
  articles.forEach(a=>(a.categories||['product']).forEach(c=>counts[c]=(counts[c]||0)+1));
  const total=articles.length;
  const buttons=CAT_ORDER.filter(c=>counts[c])
    .map(c=>`<button class="filter-tag" data-cat="${c}" onclick="setFilter('${c}')">${CAT_LABEL[c]}<span class="filter-count">${counts[c]}</span></button>`).join('');
  return `<div class="filter-bar">
    <button class="filter-tag active" data-cat="all" onclick="setFilter('all')">全部<span class="filter-count">${total}</span></button>
    ${buttons}</div>`;
}

// ── 动态加载历史日期 ──────────────────────────────────────────────
async function loadDateData(date) {
  const secContainer = document.getElementById('sections-container');

  // ① 视觉反馈：淡出当前内容
  if (secContainer) secContainer.style.opacity = '0.3';

  try {
    const resp = await fetch(`data/${date}.json`);
    if (!resp.ok) throw new Error('not found');
    const newsData = await resp.json();

    // ② 更新文章数据（供 openDetail 使用）
    const { html: secHtml, sortedArticles } = clientRenderSections(newsData.articles);
    window.ARTICLES_DATA = sortedArticles;

    // ③ 更新 DOM
    if (secContainer) { secContainer.innerHTML = secHtml; secContainer.style.opacity = '1'; }
    document.getElementById('filter-bar-container').innerHTML = clientRenderFilterBar(newsData.articles);
    document.getElementById('display-date').textContent = newsData.date || date;
    document.getElementById('display-edit-time').textContent = `edit: ${newsData.editTime || ''}`;
    const st = document.getElementById('stat-total');
    const ss = document.getElementById('stat-sources');
    const total = newsData.total || newsData.articles.length;
    const sources = newsData.sources || '?';
    if (st) { st.dataset.target = total; st.textContent = total; }
    if (ss) { ss.dataset.target = sources; ss.textContent = sources; }

    // ④ 重置筛选器状态
    if (typeof currentFilter !== 'undefined') currentFilter = 'all';

    // ⑤ 同步日历蓝框 + 按钮文字
    if (typeof window.calendarSetDate === 'function') window.calendarSetDate(date);

    // ⑥ 关闭归档日历面板
    const calPanel = document.getElementById('archiveCalPanel');
    const calBtn   = document.getElementById('archiveCalToggleBtn');
    if (calPanel) calPanel.style.display = 'none';
    if (calBtn)   calBtn.classList.remove('open');

    // ⑦ 滚动回顶部
    window.scrollTo({ top: 0, behavior: 'smooth' });

  } catch(e) {
    if (secContainer) secContainer.style.opacity = '1';
    console.warn('Failed to load date data:', date, e);
    alert(`找不到 ${date} 的数据存档`);
  }
}
</script>
<script>
(function () {
  'use strict';

  // ── Elements ─────────────────────────────────────────────────
  const overlay  = document.getElementById('detailOverlay');
  const card     = document.getElementById('detailCard');
  const bodyEl   = document.getElementById('detailBody');
  const scroll   = document.getElementById('detailScroll');
  const pager    = document.getElementById('detailPager');
  const progress = document.getElementById('detailProgress');
  const btnPrev  = document.getElementById('btnPrev');
  const btnNext  = document.getElementById('btnNext');
  const btnTts   = document.getElementById('btnTts');
  const btnShare = document.getElementById('btnShare');
  const themeBtn = document.getElementById('themeBtn');
  const backToTop= document.getElementById('backToTop');

  const articles = window.ARTICLES_DATA || [];
  let currentIdx = 0;
  let isOpen = false;

  // ── Theme ─────────────────────────────────────────────────────
  const html = document.documentElement;
  const savedTheme = localStorage.getItem('ai-daily-theme') || 'light';
  html.dataset.theme = savedTheme;
  themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

  window.toggleTheme = function () {
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    localStorage.setItem('ai-daily-theme', next);
    themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
  };

  // ── Archive: toggle calendar dropdown ───────────────────────
  window.toggleArchiveCal = function () {
    const panel = document.getElementById('archiveCalPanel');
    const btn   = document.getElementById('archiveCalToggleBtn');
    if (!panel) return;
    const opening = panel.style.display === 'none' || panel.style.display === '';
    panel.style.display = opening ? 'block' : 'none';
    if (btn) btn.classList.toggle('open', opening);
  };

  // ── Stats counter animation ──────────────────────────────────
  document.querySelectorAll('.stat-value[data-target]').forEach(el => {
    const target = parseInt(el.dataset.target, 10) || 0;
    if (target === 0) { el.textContent = '0'; return; }
    const duration = 900;
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(eased * target);
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });

  // ── Category filter ──────────────────────────────────────────
  let activeFilter = 'all';

  window.setFilter = function (cat) {
    activeFilter = cat;
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));

    document.querySelectorAll('.news-card').forEach(card => {
      if (cat === 'all') {
        card.style.display = '';
      } else {
        const cats = (card.dataset.cats || '').split(' ');
        card.style.display = cats.includes(cat) ? '' : 'none';
      }
    });

    // Hide empty sections
    document.querySelectorAll('.news-section').forEach(sec => {
      const visible = [...sec.querySelectorAll('.news-card')].some(c => c.style.display !== 'none');
      sec.style.display = visible ? '' : 'none';
    });
  };

  // ── Back to top ──────────────────────────────────────────────
  window.addEventListener('scroll', () => {
    backToTop.classList.toggle('visible', window.scrollY > 320);
  }, { passive: true });

  // ── Daily reset: clear read state when date changes ──────────
  const todayDate = '{{DATE}}';
  const storedDate = localStorage.getItem('ai-daily-read-date');
  if (storedDate !== todayDate) {
    Object.keys(localStorage)
      .filter(k => k.startsWith('read_'))
      .forEach(k => localStorage.removeItem(k));
    localStorage.setItem('ai-daily-read-date', todayDate);
  }

  // ── Apply read state from localStorage ──────────────────────
  document.querySelectorAll('.news-card[data-idx]').forEach(card => {
    if (localStorage.getItem('read_' + card.dataset.idx)) card.classList.add('read');
  });

  // ── Category helpers ─────────────────────────────────────────
  const CAT_LABEL = {
    model:'🧠 模型', product:'📦 产品', funding:'💰 融资',
    finance:'📊 财务', research:'🔬 研究', policy:'📜 政策', event:'🎪 事件',
  };
  const CAT_CLASS = {
    model:'badge-model', product:'badge-product', funding:'badge-funding',
    finance:'badge-finance', research:'badge-research', policy:'badge-policy', event:'badge-event',
  };

  function heatStars(n) { return '🔥'.repeat(Math.min(5, Math.max(1, n))); }
  function getBadges(cats) {
    return (cats || ['product']).map(c => `<span class="badge ${CAT_CLASS[c]||'badge-product'}">${CAT_LABEL[c]||c}</span>`).join('');
  }
  function getTagPills(tags) {
    if (!tags || tags.length === 0) return '';
    return `<div class="card-tags">${tags.map(t => `<span class="tag-pill">#${t}</span>`).join('')}</div>`;
  }

  // ── Render detail ─────────────────────────────────────────────
  function renderDetail(dir) {
    const a = articles[currentIdx];
    if (!a) return;

    const total = articles.length;
    pager.textContent = `${currentIdx + 1} / ${total}`;
    btnPrev.disabled = currentIdx === 0;
    btnNext.disabled = currentIdx === total - 1;

    const hasFC = a.full_content && a.full_content.trim().length > 0;
    let contentHtml;
    if (hasFC) {
      const raw = a.full_content.trim();
      contentHtml = raw.startsWith('<') ? raw : raw.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    } else {
      contentHtml = `<p>${a.summary}</p><p style="color:var(--muted);font-size:13px;font-style:italic;">📌 暂无详细正文，请阅读原文。</p>`;
    }

    const bestUrl = a.best_url || a.url || '';
    let domain = '';
    try { domain = new URL(bestUrl).hostname.replace('www.',''); } catch {}

    const sourceHtml = bestUrl ? `
      <div class="detail-divider"></div>
      <div class="detail-source-box">
        <div><div class="detail-source-label">来源</div><div class="detail-source-domain">${domain}</div></div>
        <a href="${bestUrl}" target="_blank" rel="noopener" class="detail-read-link">阅读原文 →</a>
      </div>` : '';

    const ctxHtml = a.context ? (() => {
      const body = a.context.trim().split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
      return `<div class="detail-context"><div class="detail-context-label">🔍 背景</div><div class="detail-context-body">${body}</div></div>`;
    })() : '';

    const animClass = dir === 1 ? 'anim-right' : dir === -1 ? 'anim-left' : '';
    bodyEl.innerHTML = `
      <div class="${animClass}">
        <div class="detail-meta">${getBadges(a.categories)}<span class="detail-heat">${heatStars(a.heat||3)}</span></div>
        ${getTagPills(a.tags)}
        <div class="detail-title">${a.title}</div>
        <div class="detail-content-body">${contentHtml}</div>
        ${sourceHtml}
        ${ctxHtml}
      </div>`;
    scroll.scrollTop = 0;
    progress.style.width = '0%';
  }

  // ── Progress bar on scroll ────────────────────────────────────
  scroll.addEventListener('scroll', () => {
    const { scrollTop, scrollHeight, clientHeight } = scroll;
    const pct = scrollHeight <= clientHeight ? 100 : (scrollTop / (scrollHeight - clientHeight)) * 100;
    progress.style.width = pct + '%';
  }, { passive: true });

  // ── Open / close ──────────────────────────────────────────────
  window.openDetail = function (idx) {
    currentIdx = idx;
    ttsStop();
    renderDetail(0);
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    isOpen = true;
    // Mark as read
    localStorage.setItem('read_' + idx, '1');
    const cardEl = document.querySelector(`.news-card[data-idx="${idx}"]`);
    if (cardEl) cardEl.classList.add('read');
    history.pushState({ detailOpen: true, idx }, '', '#article-' + idx);
  };

  window.closeDetail = function () {
    ttsStop();
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    isOpen = false;
    history.pushState({}, '', location.pathname + location.search);
  };

  window.handleBackdropClick = function (e) {
    if (e.target === overlay) closeDetail();
  };

  window.navigateDetail = function (dir) {
    const next = currentIdx + dir;
    if (next < 0 || next >= articles.length) return;
    ttsStop();
    currentIdx = next;
    renderDetail(dir);
    // Mark as read
    localStorage.setItem('read_' + currentIdx, '1');
    const cardEl = document.querySelector(`.news-card[data-idx="${currentIdx}"]`);
    if (cardEl) cardEl.classList.add('read');
    history.replaceState({ detailOpen: true, idx: currentIdx }, '', '#article-' + currentIdx);
  };

  window.addEventListener('popstate', e => {
    if (isOpen) {
      closeDetail();
    } else if (e.state && e.state.detailOpen) {
      openDetail(e.state.idx);
    }
  });

  // ── Deep-link: open article from URL hash on page load ────────
  (function () {
    const m = location.hash.match(/^#article-(\d+)$/);
    if (m) {
      const idx = parseInt(m[1], 10);
      if (idx >= 0 && idx < articles.length) {
        // slight delay so the page renders first
        setTimeout(() => openDetail(idx), 80);
      }
    }
  })();

  document.addEventListener('keydown', e => {
    if (!isOpen) return;
    if (e.key === 'Escape')     closeDetail();
    if (e.key === 'ArrowRight') navigateDetail(1);
    if (e.key === 'ArrowLeft')  navigateDetail(-1);
  });

  // ── Touch swipe ───────────────────────────────────────────────
  let tx = 0, ty = 0, swiping = false, tStart = 0;
  scroll.addEventListener('touchstart', e => {
    tx = e.changedTouches[0].clientX;
    ty = e.changedTouches[0].clientY;
    swiping = false;
    tStart = Date.now();
  }, { passive: true });
  scroll.addEventListener('touchmove', e => {
    const dx = Math.abs(e.changedTouches[0].clientX - tx);
    const dy = Math.abs(e.changedTouches[0].clientY - ty);
    if (dx > dy && dx > 12) swiping = true;
  }, { passive: true });
  scroll.addEventListener('touchend', e => {
    if (!swiping) return;
    // 长按（>400ms）是选字，不翻页
    if (Date.now() - tStart > 400) { swiping = false; return; }
    // 有文字被选中，不翻页
    if (window.getSelection && window.getSelection().toString().length > 0) { swiping = false; return; }
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 55) navigateDetail(dx < 0 ? 1 : -1);
    swiping = false;
  }, { passive: true });

  // ── Share ─────────────────────────────────────────────────────
  window.shareArticle = function () {
    const a = articles[currentIdx];
    if (!a) return;
    const shareUrl  = location.href;   // includes #article-N
    const shareText = `📰 ${a.title}\n\n${a.summary}\n\n🤖 AI Daily`;
    if (navigator.share) {
      navigator.share({ title: a.title, text: shareText, url: shareUrl }).catch(() => {});
    } else {
      // fallback: copy formatted card text + deep link to clipboard
      navigator.clipboard.writeText(`${shareText} · ${shareUrl}`).then(() => {
        btnShare.style.color = 'var(--green)';
        setTimeout(() => btnShare.style.color = '', 1500);
      }).catch(() => {});
    }
  };

  // ── TTS ───────────────────────────────────────────────────────
  // 优先使用预生成的 edge-tts MP3，失败时降级到 Web Speech API
  const synth = window.speechSynthesis;
  let ttsState = 0; // 0=idle 1=playing 2=paused
  let ttsUtterance = null;  // Web Speech mode
  let ttsAudio     = null;  // HTML5 Audio mode
  let ttsMode      = 'none'; // 'audio' | 'speech'

  const SVG_SPEAKER = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H3v6h3l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
  const SVG_PAUSE   = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>`;

  function updateTtsBtn() {
    btnTts.classList.toggle('playing', ttsState === 1);
    btnTts.classList.toggle('paused',  ttsState === 2);
    const label = ttsState === 1 ? '暂停朗读' : ttsState === 2 ? '继续朗读' : '朗读正文';
    btnTts.title = label;
    btnTts.innerHTML = ttsState === 2 ? SVG_PAUSE : SVG_SPEAKER;
    // 区分音源：MP3 显示蓝点，Web Speech 不显示
    btnTts.dataset.src = ttsMode;
  }

  function ttsStop() {
    if (ttsAudio) { ttsAudio.pause(); ttsAudio.currentTime = 0; ttsAudio = null; }
    if (synth) synth.cancel();
    ttsUtterance = null; ttsMode = 'none'; ttsState = 0; updateTtsBtn();
  }

  // ── MP3 模式 ──────────────────────────────────────────────────
  function playAudio(url) {
    ttsAudio = new Audio(url);
    ttsMode = 'audio';
    ttsAudio.onplay    = () => { ttsState = 1; updateTtsBtn(); };
    ttsAudio.onpause   = () => { if (ttsAudio && !ttsAudio.ended) { ttsState = 2; updateTtsBtn(); } };
    ttsAudio.onended   = () => { ttsState = 0; ttsAudio = null; updateTtsBtn(); };
    ttsAudio.onerror   = () => {
      console.warn('MP3 加载失败，降级到 Web Speech');
      ttsAudio = null; ttsMode = 'none';
      startWebSpeech(); // 自动降级
    };
    ttsAudio.play().catch(() => {
      ttsAudio = null; ttsMode = 'none'; startWebSpeech();
    });
  }

  // ── Web Speech 降级模式 ───────────────────────────────────────
  function pickVoice() {
    if (!synth) return null;
    const voices = synth.getVoices();
    const preferred = [
      'Microsoft Xiaoxiao', 'Microsoft Xiaohan', 'Microsoft Yunxi',  // Edge 神经语音
      'Tingting', 'Meijia', 'Yu-shu',                                  // macOS Siri
      'Microsoft Huihui', 'Microsoft Yaoyao',                           // 旧 Windows
    ];
    for (const name of preferred) {
      const v = voices.find(v => v.name.includes(name));
      if (v) return v;
    }
    return voices.find(v => v.lang === 'zh-CN') ||
           voices.find(v => v.lang === 'zh-TW') ||
           voices.find(v => v.lang.startsWith('zh')) || null;
  }

  function startWebSpeech() {
    if (!synth) return;
    const a = articles[currentIdx];
    if (!a) return;
    const tmp = document.createElement('div');
    tmp.innerHTML = (a.full_content && a.full_content.trim()) ? a.full_content : a.summary;
    const text = (a.title + '。' + (tmp.textContent || '')).replace(/\s+/g, ' ').trim();
    ttsUtterance = new SpeechSynthesisUtterance(text);
    ttsUtterance.lang = 'zh-CN'; ttsUtterance.rate = 0.92; ttsUtterance.pitch = 0.82;
    const setVoice = () => { const v = pickVoice(); if (v) ttsUtterance.voice = v; };
    setVoice();
    if (!synth.getVoices().length) synth.addEventListener('voiceschanged', setVoice, { once: true });
    ttsMode = 'speech';
    ttsUtterance.onstart  = () => { ttsState = 1; updateTtsBtn(); };
    ttsUtterance.onpause  = () => { ttsState = 2; updateTtsBtn(); };
    ttsUtterance.onresume = () => { ttsState = 1; updateTtsBtn(); };
    ttsUtterance.onend = ttsUtterance.onerror = () => { ttsState = 0; ttsMode = 'none'; updateTtsBtn(); };
    synth.speak(ttsUtterance);
  }

  // ── 主入口 ────────────────────────────────────────────────────
  window.toggleTts = function () {
    // 暂停/继续
    if (ttsState === 1) {
      if (ttsMode === 'audio' && ttsAudio) { ttsAudio.pause(); return; }
      if (ttsMode === 'speech' && synth)  { synth.pause(); ttsState = 2; updateTtsBtn(); return; }
    }
    if (ttsState === 2) {
      if (ttsMode === 'audio' && ttsAudio) { ttsAudio.play(); return; }
      if (ttsMode === 'speech' && synth)  { synth.resume(); ttsState = 1; updateTtsBtn(); return; }
    }

    // 开始播放
    ttsStop();
    const a = articles[currentIdx];
    if (!a) return;

    if (a.audio_url) {
      // 有预生成 MP3 → 直接播放
      playAudio(a.audio_url);
    } else {
      // 无 MP3 → Web Speech 降级
      startWebSpeech();
    }
  };

})();
</script>

<script>
// ── Archive: chips + calendar (fully client-side via archive.js) ──
(function () {
  const allDates = (window.ARCHIVE_DATES || []);   // loaded from ./archive.js
  const DATES    = new Set(allDates);
  if (DATES.size < 1) return;

  const section = document.getElementById('archiveSection');
  if (!section) return;

  // Today's date (Asia/Shanghai) — must be declared before pageDate
  const today = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai' }).format(new Date());

  // Current displayed date — mutable so it updates when user switches dates
  let pageDate = allDates[0] || today;

  const chevSvg = `<svg class="archive-pill-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;

  // 暴露给 loadDateData 使用：切换日期后同步更新日历高亮 + 按钮文字
  window.calendarSetDate = function(date) {
    pageDate = date;
    const parts = date.split('-').map(Number);
    vy = parts[0];
    vm = parts[1] - 1;
    const btn = document.getElementById('archiveCalToggleBtn');
    if (btn) btn.querySelector('span').textContent = date;
    renderCal();   // 重绘日历，新日期变蓝框
  };

  // ── Render archive section: single date-toggle button + calendar ─
  // Collapsed: shows ONLY the date. Expanded: date + ▲ appears.
  section.innerHTML = `
    <div class="archive-pill-wrap">
      <button class="archive-date-toggle" id="archiveCalToggleBtn" onclick="toggleArchiveCal()">
        <span>${pageDate}</span>${chevSvg}
      </button>
      <div class="archive-cal-panel" id="archiveCalPanel" style="display:none">
        <div id="archiveCalWidget"></div>
      </div>
    </div>`;

  // ── Calendar renderer ───────────────────────────────────────
  // 日历初始显示当前页面日期所在月份
  const [initY, initM] = pageDate.split('-').map(Number);
  let vy = initY, vm = initM - 1;
  const WD = ['一','二','三','四','五','六','日'];

  function pad(n) { return String(n).padStart(2, '0'); }
  function ds(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

  function renderCal() {
    const widget  = document.getElementById('archiveCalWidget');
    if (!widget) return;
    const offset  = (new Date(vy, vm, 1).getDay() + 6) % 7;
    const dim     = new Date(vy, vm + 1, 0).getDate();
    const prevDim = new Date(vy, vm, 0).getDate();
    let cells = '';
    for (let i = offset - 1; i >= 0; i--)
      cells += `<div class="cal-day cal-other">${prevDim - i}</div>`;
    for (let d = 1; d <= dim; d++) {
      const str = ds(vy, vm, d);
      const isPage = str === pageDate;   // 当前页面日期 → 蓝框
      const hasArc = DATES.has(str);
      const cls = 'cal-day ' + (isPage ? 'cal-today' : hasArc ? 'cal-has' : 'cal-none');
      const click = hasArc && !isPage ? `onclick="loadDateData('${str}')"` : '';
      cells += `<div class="${cls}" ${click}>${d}</div>`;
    }
    const tail = (offset + dim) % 7;
    for (let d = 1; d <= (tail ? 7 - tail : 0); d++)
      cells += `<div class="cal-day cal-other">${d}</div>`;
    const chevL = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
    const chevR = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
    widget.innerHTML = `
      <div class="cal-card">
        <div class="cal-header">
          <button class="cal-nav-btn" onclick="calNav(-1)">${chevL}</button>
          <div class="cal-month-name">${vy}年${vm + 1}月</div>
          <button class="cal-nav-btn" onclick="calNav(1)">${chevR}</button>
        </div>
        <div class="cal-weekdays">${WD.map(w => `<span>${w}</span>`).join('')}</div>
        <div class="cal-grid">${cells}</div>
      </div>`;
  }

  window.calNav = function (dir) {
    vm += dir;
    if (vm > 11) { vm = 0; vy++; }
    if (vm < 0)  { vm = 11; vy--; }
    renderCal();
  };

  // Render calendar only when panel first opens (lazy)
  const origToggle = window.toggleArchiveCal;
  window.toggleArchiveCal = function () {
    origToggle && origToggle();
    const panel = document.getElementById('archiveCalPanel');
    if (panel && panel.style.display !== 'none') renderCal();
  };
})();
</script>
