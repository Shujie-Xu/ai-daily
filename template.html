<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Daily · {{DATE}}</title>
  <meta property="og:title" content="🤖 AI 日报 · {{DATE}}"/>
  <meta property="og:description" content="{{OG_DESC}}"/>
  <meta property="og:image" content="https://shujie-xu.github.io/ai-daily/og.png"/>
  <meta property="og:url" content="https://shujie-xu.github.io/ai-daily/"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="🤖 AI 日报 · {{DATE}}"/>
  <meta name="twitter:description" content="{{OG_DESC}}"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg: #08080f;
      --bg2: #0d0d1a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --cyan: #00f5ff;
      --purple: #a855f7;
      --pink: #ec4899;
      --green: #22d3ee;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(0,245,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(168,85,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(236,72,153,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* Header */
    header {
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(0,245,255,0.3);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .date-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--cyan);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pulse {
      width: 8px; height: 8px;
      background: var(--cyan);
      border-radius: 50%;
      animation: pulse 2s infinite;
      box-shadow: 0 0 0 0 rgba(0,245,255,0.4);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0,245,255,0.4); }
      70% { box-shadow: 0 0 0 8px rgba(0,245,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,245,255,0); }
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin: 28px 0;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: rgba(0,245,255,0.3); }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Category tabs */
    .category-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .cat-tag {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .cat-tag[data-cat="funding"] { color: var(--yellow); border-color: rgba(251,191,36,0.3); }
    .cat-tag[data-cat="model"] { color: var(--cyan); border-color: rgba(0,245,255,0.3); }
    .cat-tag[data-cat="product"] { color: var(--purple); border-color: rgba(168,85,247,0.3); }
    .cat-tag[data-cat="research"] { color: var(--green); border-color: rgba(34,211,238,0.3); }
    .cat-tag[data-cat="policy"] { color: var(--pink); border-color: rgba(236,72,153,0.3); }
    .cat-tag[data-cat="open-source"] { color: #a3e635; border-color: rgba(163,230,53,0.3); }

    /* News grid */
    .news-section { margin-bottom: 48px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .heat-label { font-size: 18px; }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
    }

    .news-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .news-card:hover {
      border-color: rgba(0,245,255,0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .news-card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-cats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-funding { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .badge-model { background: rgba(0,245,255,0.12); color: var(--cyan); }
    .badge-product { background: rgba(168,85,247,0.15); color: var(--purple); }
    .badge-research { background: rgba(34,211,238,0.12); color: var(--green); }
    .badge-policy { background: rgba(236,72,153,0.15); color: var(--pink); }
    .badge-open-source { background: rgba(163,230,53,0.12); color: #a3e635; }

    .heat-score {
      font-size: 14px;
      white-space: nowrap;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
    }

    .card-summary {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .card-source {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .card-link {
      font-size: 11px;
      color: var(--cyan);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .card-link:hover { opacity: 1; }

    /* Featured card (top story) */
    .news-card.featured {
      grid-column: 1 / -1;
      flex-direction: row;
      gap: 24px;
      background: linear-gradient(135deg, rgba(0,245,255,0.06), rgba(168,85,247,0.06));
      border-color: rgba(0,245,255,0.15);
    }

    .news-card.featured .card-title { font-size: 18px; }

    .news-card.featured .featured-accent {
      width: 4px;
      min-width: 4px;
      border-radius: 999px;
      background: linear-gradient(to bottom, var(--cyan), var(--purple));
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      margin-top: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-text {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .footer-brand {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-brand span {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600;
    }

    /* Scan line effect */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* Archive */
    .archive-section { margin-bottom: 48px; }
    .archive-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .archive-item {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      transition: all 0.2s;
    }
    .archive-item:hover {
      border-color: rgba(0,245,255,0.3);
      color: var(--cyan);
    }
    .archive-today {
      border-color: rgba(0,245,255,0.3);
      color: var(--cyan);
      background: rgba(0,245,255,0.06);
    }
    .today-tag {
      background: rgba(0,245,255,0.15);
      color: var(--cyan);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 999px;
      margin-left: 4px;
    }

    /* ===================== */
    /* Detail Modal Card     */
    /* ===================== */

    /* Backdrop */
    .detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0px);
      transition: background 0.25s ease, backdrop-filter 0.25s ease;
      pointer-events: none;
    }

    .detail-overlay.open {
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(6px);
      pointer-events: all;
    }

    /* The card itself */
    .detail-card {
      position: relative;
      background: #0f0f1e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,245,255,0.06);
      width: 100%;
      max-width: 720px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      transform: scale(0.92) translateY(16px);
      opacity: 0;
      transition: transform 0.28s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.22s ease;
      overflow: hidden;
    }

    .detail-overlay.open .detail-card {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* Card top bar */
    .detail-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .detail-pager {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .detail-arrows {
      display: flex;
      gap: 6px;
    }

    .detail-arrow {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.18s;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    .detail-arrow:hover:not(:disabled) {
      border-color: rgba(0,245,255,0.45);
      color: var(--cyan);
      background: rgba(0,245,255,0.07);
    }
    .detail-arrow:disabled {
      opacity: 0.25;
      cursor: default;
    }

    /* Close button */
    .detail-close {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      flex-shrink: 0;
    }
    .detail-close:hover {
      border-color: rgba(236,72,153,0.45);
      color: var(--pink);
      background: rgba(236,72,153,0.07);
    }

    /* Scrollable body */
    .detail-scroll {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .detail-body {
      padding: 28px 28px 32px;
    }

    @media (max-width: 480px) {
      .detail-body { padding: 20px 18px 28px; }
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .detail-heat { font-size: 15px; }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 22px;
    }

    @media (max-width: 480px) { .detail-title { font-size: 17px; } }

    /* Content body */
    .detail-content-body {
      font-size: 14.5px;
      line-height: 1.85;
      color: #c0ccdc;
    }

    .detail-content-body p { margin-bottom: 14px; }
    .detail-content-body p:last-child { margin-bottom: 0; }

    .detail-content-body h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--cyan);
      margin: 22px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .detail-content-body ul {
      padding-left: 18px;
      margin-bottom: 14px;
    }

    .detail-content-body li { margin-bottom: 7px; }

    .detail-content-body strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Divider */
    .detail-divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* Source link box */
    .detail-source-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      gap: 14px;
      flex-wrap: wrap;
    }

    .detail-source-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
      font-family: 'JetBrains Mono', monospace;
    }

    .detail-source-domain {
      font-size: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    .detail-read-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, rgba(0,245,255,0.14), rgba(168,85,247,0.14));
      border: 1px solid rgba(0,245,255,0.22);
      color: var(--cyan);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .detail-read-link:hover {
      background: linear-gradient(135deg, rgba(0,245,255,0.22), rgba(168,85,247,0.22));
      border-color: rgba(0,245,255,0.4);
    }

    /* TTS button */
    .detail-tts {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
    }
    .detail-tts svg { display: block; }
    .detail-tts:hover {
      border-color: rgba(34,211,238,0.45);
      color: var(--green);
      background: rgba(34,211,238,0.07);
    }
    .detail-tts.playing {
      border-color: rgba(34,211,238,0.55);
      color: var(--green);
      background: rgba(34,211,238,0.1);
      animation: ttsPulse 1.6s ease-in-out infinite;
    }
    .detail-tts.paused {
      border-color: rgba(251,191,36,0.45);
      color: var(--yellow);
      background: rgba(251,191,36,0.07);
    }
    @keyframes ttsPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,238,0.3); }
      50%       { box-shadow: 0 0 0 6px rgba(34,211,238,0); }
    }

    /* Swipe hint strip */
    .swipe-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 6px 0 2px;
      flex-shrink: 0;
    }
    @media (min-width: 600px) { .swipe-hint { display: none; } }

    /* Slide animation for content swap */
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .anim-right { animation: slideInRight 0.2s ease; }
    .anim-left  { animation: slideInLeft  0.2s ease; }

    /* Responsive */
    @media (max-width: 640px) {
      .news-card.featured { flex-direction: column; }
      .news-card.featured .featured-accent { width: 100%; min-width: unset; height: 4px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .detail-overlay { padding: 12px 8px; }
      .detail-card { max-height: 92vh; border-radius: 16px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🤖</div>
        <div>
          <div class="logo-text">AI Daily</div>
          <div class="logo-sub">powered by 小豹包</div>
        </div>
      </div>
      <div class="date-badge">
        <div class="pulse"></div>
        {{DATE}}
      </div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value">{{TOTAL}}</div>
      <div class="stat-label">今日新闻</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">{{FUNDING_COUNT}}</div>
      <div class="stat-label">融资动态</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">{{MODEL_COUNT}}</div>
      <div class="stat-label">模型发布</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">{{SOURCES}}</div>
      <div class="stat-label">信息来源</div>
    </div>
  </div>

  <!-- News sections by heat -->
  {{SECTIONS}}

  <footer>
    <div class="footer-text">{{DATE}} 日报 · 编辑于 {{DATETIME}} · {{SEARCH_COUNT}} 次搜索</div>
    <div class="footer-brand">by <span>小豹包🍞</span> · AI Daily Dashboard</div>
  </footer>
</div>

<!-- ============================= -->
<!-- Detail Modal                  -->
<!-- ============================= -->
<!-- Backdrop (click outside to close) -->
<div class="detail-overlay" id="detailOverlay" role="dialog" aria-modal="true" onclick="handleBackdropClick(event)">
  <div class="detail-card" id="detailCard">

    <!-- Top bar: prev · pager · next · tts · close -->
    <div class="detail-topbar">
      <button class="detail-arrow" id="btnPrev" onclick="navigateDetail(-1)" title="上一条 (←)">‹</button>
      <div class="detail-pager" id="detailPager">1 / 1</div>
      <button class="detail-arrow" id="btnNext" onclick="navigateDetail(1)"  title="下一条 (→)">›</button>
      <button class="detail-tts" id="btnTts" onclick="toggleTts()" title="朗读正文">
        <!-- icon swapped by JS; default: speaker -->
        <svg id="ttsIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <!-- speaker body -->
          <path d="M11 5L6 9H3v6h3l5 4V5z"/>
          <!-- wave 1 -->
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <!-- wave 2 -->
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
      <button class="detail-close"              onclick="closeDetail()"       title="关闭 (Esc)">✕</button>
    </div>

    <!-- Swipe hint (mobile only) -->
    <div class="swipe-hint">← 左右滑动切换 →</div>

    <!-- Scrollable content -->
    <div class="detail-scroll" id="detailScroll">
      <div class="detail-body" id="detailBody">
        <!-- filled by JS -->
      </div>
    </div>

  </div>
</div>

<!-- Embedded article data -->
<script>
window.ARTICLES_DATA = {{ARTICLES_JSON}};
</script>

<script>
(function () {
  'use strict';

  const overlay = document.getElementById('detailOverlay');
  const card    = document.getElementById('detailCard');
  const body    = document.getElementById('detailBody');
  const scroll  = document.getElementById('detailScroll');
  const pager   = document.getElementById('detailPager');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnTts  = document.getElementById('btnTts');

  const articles = window.ARTICLES_DATA || [];
  let currentIdx = 0;
  let isOpen = false;

  // ── TTS ───────────────────────────────────────────────────────
  const synth = window.speechSynthesis;
  let ttsUtterance = null;
  // 0 = idle, 1 = playing, 2 = paused
  let ttsState = 0;

  function ttsStop() {
    if (synth) synth.cancel();
    ttsUtterance = null;
    ttsState = 0;
    updateTtsBtn();
  }

  // SVG icons
  const SVG_SPEAKER = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 5L6 9H3v6h3l5 4V5z"/>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
  </svg>`;
  const SVG_PAUSE = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="6" y="5" width="4" height="14" rx="1"/>
    <rect x="14" y="5" width="4" height="14" rx="1"/>
  </svg>`;

  function updateTtsBtn() {
    if (!btnTts) return;
    btnTts.classList.toggle('playing', ttsState === 1);
    btnTts.classList.toggle('paused',  ttsState === 2);
    btnTts.title   = ttsState === 1 ? '暂停朗读' : ttsState === 2 ? '继续朗读' : '朗读正文';
    btnTts.innerHTML = ttsState === 2 ? SVG_PAUSE : SVG_SPEAKER;
  }

  function getReadableText() {
    const a = articles[currentIdx];
    if (!a) return '';
    // Strip HTML tags if any, collapse whitespace
    const tmp = document.createElement('div');
    tmp.innerHTML = (a.full_content && a.full_content.trim()) ? a.full_content : a.summary;
    return (a.title + '。' + (tmp.textContent || tmp.innerText || '')).replace(/\s+/g, ' ').trim();
  }

  function pickVoice() {
    if (!synth) return null;
    const voices = synth.getVoices();
    // Prefer named warm/natural zh female voices, then any zh-CN/zh-TW
    const preferred = [
      'Tingting',      // macOS/iOS 普通话女声（较自然）
      'Meijia',        // macOS 台湾华语
      'Yu-shu',        // macOS
      'Sinji',         // macOS 粤语（备用）
      'Microsoft Huihui',  // Windows 普通话女声
      'Microsoft Yaoyao',  // Windows
    ];
    for (const name of preferred) {
      const v = voices.find(v => v.name.includes(name));
      if (v) return v;
    }
    return voices.find(v => v.lang === 'zh-CN') ||
           voices.find(v => v.lang === 'zh-TW') ||
           voices.find(v => v.lang.startsWith('zh')) ||
           null;
  }

  window.toggleTts = function () {
    if (!synth) { alert('您的浏览器不支持语音朗读'); return; }

    if (ttsState === 1) {
      // Playing → pause
      synth.pause();
      ttsState = 2;
      updateTtsBtn();
      return;
    }
    if (ttsState === 2) {
      // Paused → resume
      synth.resume();
      ttsState = 1;
      updateTtsBtn();
      return;
    }

    // Idle → start
    synth.cancel();
    const text = getReadableText();
    if (!text) return;

    ttsUtterance = new SpeechSynthesisUtterance(text);
    ttsUtterance.lang  = 'zh-CN';
    ttsUtterance.rate  = 0.92;   // 稍慢，更沉稳
    ttsUtterance.pitch = 0.82;   // 低于默认，女中音感觉

    // Try to pick a good Chinese voice (voices may load async)
    const setVoice = () => {
      const v = pickVoice();
      if (v) ttsUtterance.voice = v;
    };
    setVoice();
    if (synth.getVoices().length === 0) {
      synth.addEventListener('voiceschanged', setVoice, { once: true });
    }

    ttsUtterance.onstart  = () => { ttsState = 1; updateTtsBtn(); };
    ttsUtterance.onpause  = () => { ttsState = 2; updateTtsBtn(); };
    ttsUtterance.onresume = () => { ttsState = 1; updateTtsBtn(); };
    ttsUtterance.onend    = () => { ttsState = 0; updateTtsBtn(); };
    ttsUtterance.onerror  = () => { ttsState = 0; updateTtsBtn(); };

    synth.speak(ttsUtterance);
  };

  // ── Category helpers ──────────────────────────────────────────
  const CAT_LABEL = {
    funding: '💰 融资', model: '🧠 模型', product: '📦 产品',
    research: '🔬 研究', policy: '📜 政策', 'open-source': '💻 开源',
  };
  const CAT_CLASS = {
    funding: 'badge-funding', model: 'badge-model', product: 'badge-product',
    research: 'badge-research', policy: 'badge-policy', 'open-source': 'badge-open-source',
  };
  function heatStars(n) {
    return '🔥'.repeat(Math.min(5, Math.max(1, n)));
  }
  function getBadges(cats) {
    return (cats || ['product']).map(c =>
      `<span class="badge ${CAT_CLASS[c] || 'badge-product'}">${CAT_LABEL[c] || c}</span>`
    ).join('');
  }

  // ── Render ────────────────────────────────────────────────────
  function renderDetail(dir) {
    const a = articles[currentIdx];
    if (!a) return;

    const total = articles.length;
    pager.textContent = `${currentIdx + 1} / ${total}`;
    btnPrev.disabled = currentIdx === 0;
    btnNext.disabled = currentIdx === total - 1;

    const hasFC = a.full_content && a.full_content.trim().length > 0;
    let contentHtml;
    if (hasFC) {
      const raw = a.full_content.trim();
      contentHtml = raw.startsWith('<')
        ? raw
        : raw.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    } else {
      contentHtml = `<p>${a.summary}</p>
        <p style="color:var(--muted);font-size:13px;font-style:italic;">📌 暂无详细正文，请阅读原文。</p>`;
    }

    const bestUrl = a.best_url || a.url || '';
    let domain = '';
    try { domain = new URL(bestUrl).hostname.replace('www.', ''); } catch {}

    const sourceHtml = bestUrl ? `
      <div class="detail-divider"></div>
      <div class="detail-source-box">
        <div>
          <div class="detail-source-label">来源</div>
          <div class="detail-source-domain">${domain}</div>
        </div>
        <a href="${bestUrl}" target="_blank" rel="noopener" class="detail-read-link">阅读原文 →</a>
      </div>` : '';

    const animClass = dir === 1 ? 'anim-right' : dir === -1 ? 'anim-left' : '';

    body.innerHTML = `
      <div class="${animClass}">
        <div class="detail-meta">${getBadges(a.categories)}<span class="detail-heat">${heatStars(a.heat || 3)}</span></div>
        <div class="detail-title">${a.title}</div>
        <div class="detail-content-body">${contentHtml}</div>
        ${sourceHtml}
      </div>`;
    scroll.scrollTop = 0;
  }

  // ── Open / close ──────────────────────────────────────────────
  window.openDetail = function (idx) {
    currentIdx = idx;
    renderDetail(0);
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    isOpen = true;
    history.pushState({ detailOpen: true, idx }, '', '');
  };

  window.closeDetail = function () {
    ttsStop();
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    isOpen = false;
  };

  // Click outside card (on backdrop) → close
  window.handleBackdropClick = function (e) {
    if (e.target === overlay) closeDetail();
  };

  // ── Navigate ──────────────────────────────────────────────────
  window.navigateDetail = function (dir) {
    const next = currentIdx + dir;
    if (next < 0 || next >= articles.length) return;
    ttsStop();
    currentIdx = next;
    renderDetail(dir);
    history.replaceState({ detailOpen: true, idx: currentIdx }, '', '');
  };

  // ── Browser back button ───────────────────────────────────────
  window.addEventListener('popstate', function () {
    if (isOpen) closeDetail();
  });

  // ── Keyboard ──────────────────────────────────────────────────
  document.addEventListener('keydown', function (e) {
    if (!isOpen) return;
    if (e.key === 'Escape')     closeDetail();
    if (e.key === 'ArrowRight') navigateDetail(1);
    if (e.key === 'ArrowLeft')  navigateDetail(-1);
  });

  // ── Touch swipe (on scroll area) ─────────────────────────────
  let tx = 0, ty = 0, swiping = false;

  scroll.addEventListener('touchstart', e => {
    tx = e.changedTouches[0].clientX;
    ty = e.changedTouches[0].clientY;
    swiping = false;
  }, { passive: true });

  scroll.addEventListener('touchmove', e => {
    const dx = Math.abs(e.changedTouches[0].clientX - tx);
    const dy = Math.abs(e.changedTouches[0].clientY - ty);
    if (dx > dy && dx > 12) swiping = true;
  }, { passive: true });

  scroll.addEventListener('touchend', e => {
    if (!swiping) return;
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 55) navigateDetail(dx < 0 ? 1 : -1);
    swiping = false;
  }, { passive: true });

})();
</script>
</body>
</html>
